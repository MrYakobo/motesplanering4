function addCategory() {
  const name = prompt('Namn på ny kategori:');
  if (!name) return;
  ensureCategories();
  const maxId = db.categories.reduce((m,c) => Math.max(m,c.id), 0) + 1;
  db.categories.push({id:maxId, name});
  persist('categories');
  renderCategories();
}

function renameCategory(id) {
  const cat = db.categories.find(c=>c.id===id);
  if (!cat) return;
  const name = prompt('Nytt namn:', cat.name);
  if (!name || name === cat.name) return;
  const oldName = cat.name;
  cat.name = name;
  // Update all events with old category name
  (db.events||[]).forEach(e => { if (e.category === oldName) e.category = name; });
  persist('categories');
  persist('events');
  renderCategories();
}

function deleteCategory(id) {
  db.categories = db.categories.filter(c=>c.id!==id);
  persist('categories');
  renderCategories();
}

// ── EXPORT TAB ─────────────────────────────────────────────────────────────────
function renderExport() {
  const area = document.getElementById('export-area');
  const numMonths = exportMonths || 2;
  const start = new Date(exportStartDate + 'T00:00:00');
  const startStr = exportStartDate;
  const endMonth = new Date(start.getFullYear(), start.getMonth() + numMonths, 0);
  const endStr = localDate(endMonth);
  const events = (db.events || []).filter(e => e.date >= startStr && e.date <= endStr).sort((a,b) => (a.date+a.time).localeCompare(b.date+b.time));

  const monthNames = ['Januari','Februari','Mars','April','Maj','Juni','Juli','Augusti','September','Oktober','November','December'];
  const dayNames = ['Söndag','Måndag','Tisdag','Onsdag','Torsdag','Fredag','Lördag'];

  // Group by month
  const byMonth = {};
  events.forEach(ev => {
    const m = parseInt(ev.date.slice(5,7)) - 1;
    if (!byMonth[m]) byMonth[m] = [];
    byMonth[m].push(ev);
  });

  // Generate the HTML in the same format as the site
  const cssBlock = `<style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400&display=swap');
    .api { margin-bottom: 2em; }
    .api>p { font-family: 'Roboto', sans-serif; font-weight: 100; text-transform: none; text-align: center; font-size: 3.95em; color: #a30c0c !important; display: table; margin: 10px auto !important; padding: 10px 20px 30px 20px; }
    .api .weekday { border-top: 1px solid rgba(0, 0, 0, .2); }
    .api tr.today { background-color: rgba(255, 255, 0, .1); }
    .api table { border-collapse: collapse; font-family: 'Roboto', sans-serif; font-weight: 300; margin: 10px auto; }
    .api td { padding: 0 7px 4px 8px; }
    td.holiday { text-align: center; letter-spacing: .2rem; font-weight: 200; text-transform: uppercase; font-size: 1.5em; padding-top: 10px; padding-bottom: 5px; }
    tr.holiday { border-right: 5px solid; border-left: 5px solid; border-color: #a30c0c; }
</style>`;

  let exportHtml = '';
  const todayStr = getTodayStr();

  // Get current week range for thisweek class
  const curWeek = getCurrentWeekRange();

  Object.keys(byMonth).sort((a,b) => a-b).forEach(m => {
    const monthEvents = byMonth[m];
    let rows = '';
    let lastDate = '';

    // Group events by date to figure out lastinweek
    const byDate = {};
    monthEvents.forEach(ev => {
      if (!byDate[ev.date]) byDate[ev.date] = [];
      byDate[ev.date].push(ev);
    });
    const dates = Object.keys(byDate).sort();

    dates.forEach((dateStr, dateIdx) => {
      const evs = byDate[dateStr];
      const d = new Date(dateStr + 'T00:00:00');
      const dayName = dayNames[d.getDay()];
      const dayNum = d.getDate();
      const isThisWeek = dateStr >= curWeek.from && dateStr <= curWeek.to;
      const isSunday = d.getDay() === 0;

      // Check if this is the last date in its week (next date is in a different week or doesn't exist)
      const nextDate = dates[dateIdx + 1];
      let isLastInWeek = false;
      if (isSunday) {
        isLastInWeek = true;
      } else if (nextDate) {
        const nextD = new Date(nextDate + 'T00:00:00');
        const thisWeekNum = getWeekNumber(d);
        const nextWeekNum = getWeekNumber(nextD);
        if (nextWeekNum !== thisWeekNum) isLastInWeek = true;
      } else {
        isLastInWeek = true;
      }

      evs.forEach((ev, evIdx) => {
        const isFirst = evIdx === 0;
        const weekdayCls = isFirst ? 'weekday' : '';
        const thisweekCls = isThisWeek ? ' thisweek' : '';
        const lastCls = (isLastInWeek && evIdx === evs.length - 1) ? ' lastinweek' : '';
        const todayCls = dateStr === todayStr ? ' today' : '';
        const cls = (weekdayCls + thisweekCls + lastCls + todayCls).trim();

        const dateCell = isFirst ? `${dayName}&nbsp;${dayNum}` : '';
        const titleCell = ev.infoLink
          ? `${ev.title} - <a href="${ev.infoLink}">Läs mer här</a>`
          : ev.title;

        rows += `<tr class="${cls}">\n    <td>${dateCell}</td>\n    <td>${ev.time || ''}</td>\n    <td>${titleCell}</td>\n</tr>\n`;
      });
    });

    exportHtml += `<div class="api">\n    <p>${monthNames[m]}</p>\n    <table style="border: 0;" class="dataframe">\n        <tbody>\n${cssBlock}\n${rows}        </tbody>\n    </table>\n</div>\n`;
  });

  const wrappedHtml = `<div class="wpb_wrapper">\n${exportHtml}</div>`;

  // Render preview + raw code
  area.innerHTML = `
    <div class="export-toolbar">
      <label style="font-size:13px;color:#6b7280">Från:</label>
      <input type="date" value="${startStr}" onchange="exportStartDate=this.value;renderExport()" style="border:1px solid #d1d5db;border-radius:6px;padding:5px 8px;font-size:13px">
      <label style="font-size:13px;color:#6b7280">Månader:</label>
      <select onchange="exportMonths=parseInt(this.value);renderExport()" style="border:1px solid #d1d5db;border-radius:6px;padding:5px 8px;font-size:13px">
        ${[1,2,3,4,6,9,12].map(n => `<option value="${n}" ${n===numMonths?'selected':''}>${n}</option>`).join('')}
      </select>
      <button class="btn" onclick="copyExport()">Kopiera HTML</button>
      <span style="font-size:13px;color:#6b7280">${events.length} händelser · → ${endStr}</span>
    </div>
    <div class="export-preview" id="export-preview">${wrappedHtml}</div>
    <div class="export-code" id="export-code"></div>`;

  // Set raw HTML as text (escaped)
  document.getElementById('export-code').textContent = wrappedHtml;
}

function copyExport() {
  const code = document.getElementById('export-code');
  if (!code) return;
  navigator.clipboard.writeText(code.textContent).then(() => {
    const btn = document.querySelector('.export-toolbar .btn');
    if (btn) { const orig = btn.textContent; btn.textContent = 'Kopierad!'; setTimeout(() => btn.textContent = orig, 1500); }
  });
}

// ── TEAM BOARD ────────────────────────────────────────────────────────────────
function renderTeamBoard() {
  const area = document.getElementById('team-board-area');
  const teamTasks = db.tasks.filter(t => t.teamTask);
  if (!teamBoardTaskId && teamTasks.length > 0) teamBoardTaskId = teamTasks[0].id;

  const teams = db.teams.filter(t => t.taskId === teamBoardTaskId).sort((a,b) => a.number - b.number);
  const allInTeams = new Set(teams.flatMap(t => t.members));

  const taskLinks = teamTasks.map(t =>
    `<button onclick="teamBoardTaskId=${t.id};renderTeamBoard()" class="tb-task-link${t.id===teamBoardTaskId?' active':''}">${t.name}</button>`
  ).join('') + `<button onclick="onTeamTaskSelect('__new__')" class="tb-task-link tb-task-add"><i data-lucide="plus" style="width:12px;height:12px"></i> Ny teamuppgift</button>`;

  let html = `<div class="team-board-toolbar">
    ${taskLinks}
    <span style="flex:1"></span>
    <span style="font-size:13px;color:#6b7280">${teams.length} team · ${allInTeams.size} personer</span>
  </div>
  <div class="team-board" id="team-board">`;

  // Pool column
  html += `<div class="team-col pool-col">
    <div class="team-col-header">Alla personer <span class="team-col-count">${db.contacts.length}</span></div>
    <input class="pool-search" type="text" placeholder="Sök…" oninput="filterPool(this.value)">
    <div class="team-col-body" id="pool-body" data-team-id="pool">`;
  db.contacts.sort((a,b) => a.name.localeCompare(b.name)).forEach(c => {
    const inTeam = allInTeams.has(c.id);
    html += `<div class="pool-card${inTeam?' in-team':''}" draggable="true" data-contact-id="${c.id}" data-name="${c.name.toLowerCase()}" onclick="openContactModal(${c.id})">${c.name}</div>`;
  });
  html += `</div></div>`;

  // Team columns
  teams.forEach(team => {
    html += `<div class="team-col">
      <div class="team-col-header">
        <span>Team ${team.number}</span>
        <button class="card-remove" onclick="if(confirm('Ta bort Team ${team.number}?'))deleteTeamCol(${team.id})" title="Ta bort team"><i data-lucide="x" style="width:14px;height:14px"></i></button>
      </div>
      <div class="team-col-body" data-team-id="${team.id}">`;
    team.members.forEach(mid => {
      const c = db.contacts.find(x => x.id === mid);
      if (!c) return;
      html += `<div class="team-card" draggable="true" data-contact-id="${c.id}" onclick="openContactModal(${c.id})">
        <span>${c.name}</span>
        <button class="card-remove" onclick="event.stopPropagation();removeFromTeam(${team.id},${c.id})"><i data-lucide="x" style="width:12px;height:12px"></i></button>
      </div>`;
    });
    html += `</div></div>`;
  });

  // "+ Nytt team" column
  const nextNum = teams.length > 0 ? Math.max(...teams.map(t=>t.number)) + 1 : 1;
  const taskName = db.tasks.find(t=>t.id===teamBoardTaskId)?.name || 'team';
  html += `<div class="team-col" style="min-width:120px;flex:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#9ca3af;font-size:13px" onclick="createTeamCol(${teamBoardTaskId},${nextNum})">
    <div style="text-align:center"><i data-lucide="plus-circle" style="width:24px;height:24px;margin-bottom:4px"></i><br>Nytt ${taskName}</div>
  </div>`;

  html += '</div>';
  area.innerHTML = html;
  area.style.display = '';
  lucide.createIcons({nameAttr:'data-lucide', attrs:{class:'lucide-icon'}});
  initTeamBoardDrag();
}

function filterPool(q) {
  q = q.toLowerCase();
  document.querySelectorAll('#pool-body .pool-card').forEach(el => {
    el.style.display = el.dataset.name.includes(q) ? '' : 'none';
  });
}

function onTeamTaskSelect(val) {
  if (val === '__new__') {
    const name = prompt('Namn på ny teamuppgift:');
    if (!name) { return; }
    const maxId = db.tasks.reduce((m,t) => Math.max(m,t.id), 0) + 1;
    db.tasks.push({id:maxId, name, teamTask:true, mailbot:false, phrase:''});
    persist('tasks');
    teamBoardTaskId = maxId;
    renderTeamBoard();
  } else {
    teamBoardTaskId = parseInt(val);
    renderTeamBoard();
  }
}

function createTeamCol(taskId, num) {
  const maxId = db.teams.reduce((m,t) => Math.max(m,t.id), 0) + 1;
  db.teams.push({id:maxId, taskId, number:num, members:[]});
  persist('teams');
  renderTeamBoard();
}

function deleteTeamCol(teamId) {
  db.teams = db.teams.filter(t => t.id !== teamId);
  persist('teams');
  renderTeamBoard();
}

function removeFromTeam(teamId, contactId) {
  const team = db.teams.find(t => t.id === teamId);
  if (!team) return;
  team.members = team.members.filter(id => id !== contactId);
  persist('teams');
  renderTeamBoard();
}

function addToTeam(teamId, contactId) {
  const team = db.teams.find(t => t.id === teamId);
  if (!team) return;
  if (!team.members.includes(contactId)) team.members.push(contactId);
  persist('teams');
}

function moveContactBetweenTeams(contactId, fromTeamId, toTeamId) {
  if (fromTeamId === toTeamId) return;
  // Remove from old team
  if (fromTeamId !== 'pool') {
    const from = db.teams.find(t => t.id === parseInt(fromTeamId));
    if (from) from.members = from.members.filter(id => id !== contactId);
  }
  // Add to new team
  if (toTeamId !== 'pool') {
    const to = db.teams.find(t => t.id === parseInt(toTeamId));
    if (to && !to.members.includes(contactId)) to.members.push(contactId);
  }
  persist('teams');
  renderTeamBoard();
}

function initTeamBoardDrag() {
  const board = document.getElementById('team-board');
  if (!board) return;
  let dragContactId = null;
  let dragFromTeam = null;

  board.addEventListener('dragstart', e => {
    const card = e.target.closest('[data-contact-id]');
    if (!card) return;
    dragContactId = parseInt(card.dataset.contactId);
    const col = card.closest('[data-team-id]');
    dragFromTeam = col ? col.dataset.teamId : null;
    card.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', dragContactId);
  });

  board.addEventListener('dragend', e => {
    const card = e.target.closest('[data-contact-id]');
    if (card) card.classList.remove('dragging');
    board.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    dragContactId = null;
    dragFromTeam = null;
  });

  board.addEventListener('dragover', e => {
    const body = e.target.closest('[data-team-id]');
    if (!body) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    board.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    body.classList.add('drag-over');
  });

  board.addEventListener('dragleave', e => {
    const body = e.target.closest('[data-team-id]');
    if (body && !body.contains(e.relatedTarget)) body.classList.remove('drag-over');
  });

  board.addEventListener('drop', e => {
    e.preventDefault();
    const body = e.target.closest('[data-team-id]');
    if (!body || dragContactId === null) return;
    body.classList.remove('drag-over');
    const toTeamId = body.dataset.teamId;
    moveContactBetweenTeams(dragContactId, dragFromTeam, toTeamId);
    dragContactId = null;
    dragFromTeam = null;
  });
}

// ── MAILBOT ───────────────────────────────────────────────────────────────────
function renderMailbot() {
  const area = document.getElementById('mailbot-area');
  const now = getToday();
  const todayStr = localDate(now);
  const in30 = new Date(now); in30.setDate(now.getDate() + 30);
  const in30Str = localDate(in30);

  // Upcoming events with assignments
  const upcoming = (db.events || [])
    .filter(e => e.date >= todayStr && e.date <= in30Str)
    .sort((a,b) => (a.date+a.time).localeCompare(b.date+b.time));

  // Collect all assigned people across upcoming events
  const allPeopleIds = new Set();
  const noEmailIds = new Set();
  let totalAssignments = 0;
  let missingEmailCount = 0;

  function getPeopleForEvent(ev) {
    const asgn = assignments[ev.id] || {};
    const people = [];
    Object.entries(asgn).forEach(([tid, val]) => {
      const task = db.tasks.find(t => t.id === parseInt(tid));
      if (!task || !task.mailbot) return;
      if (val.type === 'contact') {
        (val.ids || []).forEach(cid => people.push({cid, task: task.name}));
      } else if (val.type === 'team') {
        const team = db.teams.find(t => t.id === val.id);
        if (team) team.members.forEach(cid => people.push({cid, task: task.name}));
      }
    });
    return people;
  }

  const eventData = upcoming.map(ev => {
    const people = getPeopleForEvent(ev);
    const withEmail = [];
    const withoutEmail = [];
    people.forEach(p => {
      const c = db.contacts.find(x => x.id === p.cid);
      if (!c) return;
      allPeopleIds.add(c.id);
      totalAssignments++;
      if (c.email) {
        withEmail.push({...p, name: c.name, email: c.email});
      } else {
        withoutEmail.push({...p, name: c.name});
        noEmailIds.add(c.id);
        missingEmailCount++;
      }
    });
    return {ev, people, withEmail, withoutEmail};
  }).filter(d => d.people.length > 0);

  // Compute reminder schedule
  const reminders6d = upcoming.filter(ev => {
    const evDate = new Date(ev.date + 'T00:00:00');
    const diff = Math.round((evDate - now) / 86400000);
    return diff >= 5 && diff <= 7;
  });
  const reminders1d = upcoming.filter(ev => {
    const evDate = new Date(ev.date + 'T00:00:00');
    const diff = Math.round((evDate - now) / 86400000);
    return diff >= 0 && diff <= 2;
  });

  // Summary cards
  let html = `<div class="mb-summary">
    <div class="mb-card"><div class="mb-card-num">${upcoming.length}</div><div class="mb-card-label">Händelser närmaste 30 dagarna</div></div>
    <div class="mb-card"><div class="mb-card-num">${allPeopleIds.size}</div><div class="mb-card-label">Unika personer tilldelade</div></div>
    <div class="mb-card ${noEmailIds.size > 0 ? 'danger' : 'ok'}"><div class="mb-card-num">${noEmailIds.size}</div><div class="mb-card-label">Saknar e-post</div></div>
    <div class="mb-card ${missingEmailCount > 0 ? 'warn' : 'ok'}"><div class="mb-card-num">${missingEmailCount}</div><div class="mb-card-label">Utskick som inte kan skickas</div></div>
    <div class="mb-card"><div class="mb-card-num">${reminders6d.length + reminders1d.length}</div><div class="mb-card-label">Påminnelser att skicka snart</div></div>
  </div>`;

  // Reminder schedule info
  html += `<div style="background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:14px 18px;margin-bottom:16px;font-size:13px;color:#374151">
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px"><i data-lucide="clock" style="width:14px;height:14px;color:#6b7280"></i> Påminnelseschema</div>
    <div style="color:#6b7280;font-size:12px">• 6 dagar före kl 09:00 — första påminnelsen</div>
    <div style="color:#6b7280;font-size:12px">• 1 dag före kl 18:00 — sista påminnelsen</div>
  </div>`;

  // Event list
  html += `<h3 style="font-size:14px;font-weight:600;color:#374151;margin-bottom:10px">Kommande händelser med tilldelningar</h3>`;

  if (eventData.length === 0) {
    html += `<div style="color:#9ca3af;font-size:13px;padding:20px;text-align:center">Inga händelser med tilldelningar de närmaste 30 dagarna</div>`;
  }

  eventData.forEach(({ev, withEmail, withoutEmail}) => {
    const total = withEmail.length + withoutEmail.length;
    const statusCls = withoutEmail.length === 0 ? 'mb-status-ok' : withoutEmail.length === total ? 'mb-status-danger' : 'mb-status-warn';
    const statusText = withoutEmail.length === 0 ? 'Alla nåbara' : `${withoutEmail.length} saknar e-post`;

    html += `<div class="mb-event">
      <div class="mb-event-header">
        <span class="mb-event-date">${ev.date} ${ev.time || ''}</span>
        <span class="mb-event-title">${ev.title}</span>
        <span class="mb-event-status ${statusCls}">${statusText}</span>
        <button onclick="event.stopPropagation();previewMailchat(${ev.id})" style="background:none;border:1px solid #d1d5db;border-radius:4px;padding:2px 8px;font-size:11px;cursor:pointer;color:#6b7280;display:inline-flex;align-items:center;gap:3px"><i data-lucide="mail" style="width:10px;height:10px"></i> Mailchat</button>
      </div>
      <div class="mb-people">`;

    withEmail.forEach(p => {
      html += `<span class="mb-person has-email" title="${p.email} — ${p.task}" onclick="previewEmail(${ev.id},${p.cid})" style="cursor:pointer"><i data-lucide="mail" style="width:10px;height:10px"></i> ${p.name}</span>`;
    });
    withoutEmail.forEach(p => {
      html += `<span class="mb-person no-email" title="Saknar e-post — ${p.task}" onclick="openContactModal(${p.cid})"><i data-lucide="mail-x" style="width:10px;height:10px"></i> ${p.name}</span>`;
    });

    html += `</div></div>`;
  });

  area.innerHTML = html;
  lucide.createIcons({nameAttr:'data-lucide', attrs:{class:'lucide-icon'}});
}

function getTodayNameForTask(taskId) {
  const todayStr = getTodayStr();
  const todayEvents = (db.events||[]).filter(e => e.date === todayStr);
  for (const ev of todayEvents) {
    const asgn = assignments[ev.id]?.[taskId];
    if (asgn?.type === 'contact' && asgn.ids.length > 0) {
      return asgn.ids.map(cid => db.contacts.find(x=>x.id===cid)?.name).filter(Boolean).join(', ');
    }
  }
  return null;
}

function enterNameplateFullscreen(taskId) {
  if (currentTab !== 'namnskyltar') switchTab('namnskyltar', true);
  // If no taskId, try predikant
  if (!taskId) {
    const t = db.tasks.find(t => t.name.toLowerCase().includes('predikant'));
    if (t) taskId = t.id;
  }
  const task = db.tasks.find(t => t.id === taskId);
  const name = taskId ? getTodayNameForTask(taskId) : null;
  const area = document.getElementById('namnskyltar-area');
  area.innerHTML = name
    ? `<div class="nameplate-full"><div class="np-name">${name}</div><div class="np-line"></div><div class="np-role">${task?.name||''}</div></div>`
    : `<div style="color:#666;font-size:18px;width:100%;height:100%;display:flex;align-items:center;justify-content:center">Ingen tilldelad idag</div>`;
  area.style.display = '';
  document.body.classList.add('nameplate-fullscreen');
}

function exitNameplateFullscreen() {
  document.body.classList.remove('nameplate-fullscreen');
  history.replaceState(null, '', '#namnskyltar');
  renderNamnskyltar();
}

function buildVolunteerTable(eventId) {
  const asgn = assignments[eventId] || {};
  let rows = '';
  Object.entries(asgn).forEach(([tid, val]) => {
    const task = db.tasks.find(t=>t.id===parseInt(tid));
    if (!task) return;
    if (val.type==='contact') {
      (val.ids||[]).forEach(cid => { const c=db.contacts.find(x=>x.id===cid); if(!c) return; rows += `<tr><td>${task.name}</td><td>${c.name}</td></tr>`; });
    } else if (val.type==='team') {
      const team = db.teams.find(t=>t.id===val.id);
      if (!team) return;
      rows += `<tr><td colspan="2" style="padding-top:12px"><strong>${task.name} — Team ${team.number}</strong></td></tr>`;
      team.members.forEach(cid => { const c=db.contacts.find(x=>x.id===cid); if(!c) return; rows += `<tr><td></td><td>${c.name}</td></tr>`; });
    }
  });
  return rows;
}

function findPersonTask(eventId, contactId) {
  const asgn = assignments[eventId] || {};
  for (const [tid, val] of Object.entries(asgn)) {
    const task = db.tasks.find(t=>t.id===parseInt(tid));
    if (!task) continue;
    if (val.type==='contact' && (val.ids||[]).includes(contactId)) return task;
    if (val.type==='team') { const team=db.teams.find(t=>t.id===val.id); if (team && team.members.includes(contactId)) return task; }
  }
  return null;
}

function previewMailchat(eventId) {
  const ev = db.events.find(e=>e.id===eventId);

  const dayNames = ['söndag','måndag','tisdag','onsdag','torsdag','fredag','lördag'];

  const asgn = assignments[ev.id] || {};
  let zebraRows = '';

  Object.entries(asgn).forEach(([tid, val]) => {
    const task = db.tasks.find(t=>t.id===parseInt(tid));

    const names = [];
    if (val.type==='contact') (val.ids||[]).forEach(cid => { const c=db.contacts.find(x=>x.id===cid); if(c){names.push(c.name);if(c.email)recipients.push(c);} });
    else if (val.type==='team') { const team=db.teams.find(t=>t.id===val.id); if(team) team.members.forEach(cid => { const c=db.contacts.find(x=>x.id===cid); if(c){names.push(c.name);if(c.email)recipients.push(c);} }); }
    zebraRows += `<tr><td style="padding:3px 8px">${task.name}</td><td style="padding:3px 8px">${names.join(', ')}</td></tr>`;
  });

  const emailHtml = `<div style="font-family:'Be Vietnam',sans-serif;background:#fff;padding:20px;border-radius:3px">
    <h1 style="font-size:35px;font-weight:300;text-align:center;margin-bottom:30px">Hej alla!</h1>
    <p>Ni som är med i den här mailtråden gör "${ev.title}" <strong>${dateStr}</strong> tillsammans. Använd den här mailtråden för kommunikation kring sådant som behöver spikas inför ${dayNames[d.getDay()]}.</p>

      <thead style="border-bottom:1px solid #e0e0e0;font-weight:900"><tr><th style="padding:3px 8px">Vad</th><th style="padding:3px 8px">Vem</th></tr></thead>
      <tbody>${zebraRows}</tbody>
    </table>
    <br><br>
    <p>Allt som skickas i den här mailtråden skickas också till bilddatorns mail.</p>
    <hr style="border:0;border-bottom:1px solid #f6f6f6;margin:20px 0">
    <h3 style="font-weight:400">Fortsatt välsignad vecka!</h3>
    <img style="width:150px" src="http://pingstkungsbacka.se/logo.png">
  </div>
  <div style="text-align:center;margin-top:10px;font-size:12px;color:#999">Pingstkyrkan Kungsbacka<br>Det här mailet avser ${ev.date} ${ev.time||''}.<br>Ser något fel ut? Svara på det här mailet isåfall.</div>`;

  const modal = document.getElementById('detail-modal');
  document.getElementById('detail-modal-content').innerHTML = `
    <div class="sidebar-header"><h3>Mailchat → ${ev.title}</h3><button class="sidebar-close" onclick="closeDetailModal()">×</button></div>
    <div class="sidebar-body" style="background:#f6f6f6;padding:16px">
      <div style="margin-bottom:8px;font-size:12px;color:#6b7280"><strong>Till:</strong> ${recipients.map(c=>c.email).join(', ')}<br><strong>Ämne:</strong> ${ev.title} ${ev.date}</div>
      ${emailHtml}
    </div>`;
  modal.classList.add('open');
}

function getAssignmentLabel(eid, tid) {
  const a = assignments[eid]?.[tid];
  if (!a) return '—';
  if (a.type==='team') {
    const t = db.teams.find(t=>t.id===a.id);
    return t ? `Team ${t.number}` : '?';
  }
  return (a.ids||[]).map(id=>db.contacts.find(c=>c.id===id)?.name).filter(Boolean).join(', ') || '—';
}

}

// track sidebar dirty state
function initSidebarTracking() {
  const body = document.getElementById('sb-body');
  if (!body) return;
  const mark = () => { const b = document.getElementById('btn-save'); if (b) b.classList.add('dirty'); };
  body.addEventListener('input', mark);
  body.addEventListener('change', mark);
}

function sidebarContact(r) {
  const todayStr = getTodayStr();
  const upcoming = (db.events||[])
    .filter(e => e.date >= todayStr)
    .filter(e => {
      const asgn = assignments[e.id] || {};
      return Object.values(asgn).some(val => {
        if (val.type === 'contact') return (val.ids||[]).includes(r.id);
        if (val.type === 'team') { const team = db.teams.find(t=>t.id===val.id); return team && team.members.includes(r.id); }
        return false;
      });
    })
    .sort((a,b) => (a.date+a.time).localeCompare(b.date+b.time))
    .slice(0, 10);
  return `
  <div class="sidebar-header">
    <h3>${r.name}</h3>
    <button class="sidebar-close" onclick="closeContactDetail()">×</button>
  </div>
  <div class="sidebar-body" id="sb-body">
    <div class="field-group"><label>Full name</label><input type="text" value="${r.name}" id="sb-cname"></div>
    <div class="field-group"><label>Email</label><input type="email" value="${r.email}" id="sb-cemail"></div>
    <div class="field-group"><label>Phone</label><input type="tel" value="${r.phone}" id="sb-cphone"></div>
    <div class="sb-section">
      <h4>Upcoming events</h4>
      <ul class="mini-list">${upcoming.length ? upcoming.map(e=>{
        const asgn = assignments[e.id]||{};
        const tasks = Object.entries(asgn).filter(([tid,val]) => {
          if (val.type==='contact') return (val.ids||[]).includes(r.id);
          if (val.type==='team') { const team=db.teams.find(t=>t.id===val.id); return team&&team.members.includes(r.id); }
          return false;
        }).map(([tid])=>db.tasks.find(t=>t.id===parseInt(tid))?.name).filter(Boolean).join(', ');
        return `<li><span>${e.date}</span><span class="who">${esc(e.title)}${tasks?' · '+tasks:''}</span></li>`;
      }).join('') : '<li style="color:#9ca3af">Inga kommande tilldelningar</li>'}</ul>
    </div>
  </div>
  <div class="sidebar-footer">
    <button class="btn-save" id="btn-save" onclick="saveContact(${r.id})" data-is-new="${r._isNew?'1':''}">Spara</button>
  </div>`;
}

function openContactModal(id) {
  const c = db.contacts.find(x=>x.id===id);
  if (!c) return;
  const modal = document.getElementById('detail-modal');
  document.getElementById('detail-modal-content').innerHTML = sidebarContact(c);
  modal.classList.add('open');
  initSidebarTracking();
  lucide.createIcons({nameAttr:'data-lucide', attrs:{class:'lucide-icon'}});
}

function closeContactDetail() {
  const useModal = ['teams','mailbot'].includes(currentTab);
  if (useModal) {
    closeDetailModal();
    if (currentTab === 'teams') renderTeamBoard();
    if (currentTab === 'mailbot') renderMailbot();
  } else {
    renderSidebar(null); selectedId = null; renderTable();

// ── SAVE EVENT + SMART PROPAGATION ────────────────────────────────────────────
function saveEvent(id) {
  const isNew = document.getElementById('btn-save')?.dataset.isNew === '1';

  if (isNew) {
    // Create new event from form values
    const ev = {
      id: id,
      date: document.getElementById('sb-date').value,
      time: document.getElementById('sb-time').value,
      title: document.getElementById('sb-title').value,
      category: document.getElementById('sb-category').value,
      description: document.getElementById('sb-desc').value,
      infoLink: document.getElementById('sb-infolink').value,
      promoSlides: [...document.querySelectorAll('#sb-promos input[data-promo-idx]')].map(i=>i.value).filter(Boolean),
      expectedTasks: [...document.querySelectorAll('[data-exp-task]')].filter(cb=>cb.checked).map(cb=>parseInt(cb.dataset.expTask)),
      volunteers: 0,
    };
    db.events.push(ev);
    assignments[ev.id] = {};
    persist('events');
    closeDetailModal();
    applyFilters();
    return;
  }

  const ev = db.events.find(e=>e.id===id);
  if (!ev) return;
  // snapshot original date before reading form
  const oldDate = ev.date;
  const oldTitle = ev.title;
  const skipFields = new Set(['id','date','time','volunteers','_isNew']);
  // snapshot all propagatable fields before edit
  const oldSnap = {};
  Object.keys(ev).forEach(k => { if (!skipFields.has(k)) oldSnap[k] = JSON.stringify(ev[k]); });
  // read sidebar values
  ev.date = document.getElementById('sb-date').value;
  ev.time = document.getElementById('sb-time').value;
  ev.title = document.getElementById('sb-title').value;
  ev.category = document.getElementById('sb-category').value;
  ev.description = document.getElementById('sb-desc').value;
  ev.infoLink = document.getElementById('sb-infolink').value;
  ev.promoSlides = [...document.querySelectorAll('#sb-promos input[data-promo-idx]')].map(i=>i.value).filter(Boolean);
  ev.expectedTasks = [...document.querySelectorAll('[data-exp-task]')].filter(cb=>cb.checked).map(cb=>parseInt(cb.dataset.expTask));

  // check which propagatable fields changed
  const changedFields = Object.keys(oldSnap).filter(k => JSON.stringify(ev[k]) !== oldSnap[k]);

  const futureMatches = db.events.filter(e => e.id !== id && e.title === oldTitle && e.date > oldDate);

  if (changedFields.length > 0 && futureMatches.length > 0) {
    showPropagatePopup(ev, futureMatches, oldTitle, changedFields);
  } else {
    persist('events');
    applyFilters();
    if (['monster','calendar','week','year'].includes(currentView)) { closeDetailModal(); }
    else { renderSidebar(ev); }
  }
}

function showPropagatePopup(ev, matches, oldTitle, changedFields) {
  const count = matches.length;
  const overlay = document.getElementById('propagate-modal');
  document.getElementById('prop-msg').innerHTML =
    `Du ändrade <strong>"${oldTitle}"</strong>. Det finns <strong>${count}</strong> framtida händelse${count>1?'r':''} med samma titel.<br>Vill du uppdatera dem också?`;
  const fieldLabel = k => {
    const val = ev[k];
    const display = Array.isArray(val) ? `(${val.length} st)` : (val || '(tom)');
    return `${k} → ${display}`;
  };
  document.getElementById('prop-fields').innerHTML = changedFields.map(k =>
    `<label><input type="checkbox" checked data-prop="${k}"> ${fieldLabel(k)}</label>`
  ).join('');
  overlay._ev = ev;
  overlay._matches = matches;
  overlay.classList.add('open');
}

function executePropagation(apply) {
  const overlay = document.getElementById('propagate-modal');
  if (apply) {
    const ev = overlay._ev;
    const matches = overlay._matches;
    const fields = [...document.querySelectorAll('#prop-fields input[data-prop]')]
      .filter(cb=>cb.checked).map(cb=>cb.dataset.prop);
    matches.forEach(m => {
      fields.forEach(f => {
        m[f] = typeof ev[f] === 'object' ? JSON.parse(JSON.stringify(ev[f])) : ev[f];
      });
    });
  }
  overlay.classList.remove('open');
  persist('events');
  applyFilters();
  const ev = overlay._ev;
  if (['monster','calendar','week','year'].includes(currentView)) { closeDetailModal(); }
  else { renderSidebar(ev); }
}

// ── GENERATE RECURRING EVENTS ──────────────────────────────────────────────────
const dayMap = {Mån:1,Tis:2,Ons:3,Tor:4,Fre:5,Lör:6,Sön:0};
const dayLabels = ['Mån','Tis','Ons','Tor','Fre','Lör','Sön'];
let genPatterns = {};

function openGenModal() {
  // load from db
  genPatterns = JSON.parse(JSON.stringify(db.recurring_events || {}));
  renderGenModal();
  document.getElementById('gen-modal').classList.add('open');
}

function closeGenModal() {
  document.getElementById('gen-modal').classList.remove('open');
}

function renderGenModal() {
  const body = document.getElementById('gen-body');
  const today = getToday();
  const defFrom = document.getElementById('gen-from')?.value || localDate(today);
  const defTo = document.getElementById('gen-to')?.value || localDate(new Date(today.getFullYear(), today.getMonth()+3, today.getDate()));

  let html = `<div class="gen-range">
    <div><label>Från</label><br><input type="date" id="gen-from" value="${defFrom}" onchange="previewGen()"></div>
    <div><label>Till</label><br><input type="date" id="gen-to" value="${defTo}" onchange="previewGen()"></div>
  </div>`;

  html += dayLabels.map(day => {
    const entries = genPatterns[day] || [];
    const rows = entries.map((e, i) => {
      const filter = e.filter || 'ALL';
      const time = e.time || '10:00';
      const title = e.title || '';
      return `<div class="gen-row">
        <select onchange="updateGenEntry('${day}',${i},'filter',this.value);previewGen()">
          <option value="ALL" ${filter==='ALL'?'selected':''}>Varje</option>
          <option value="ODD" ${filter==='ODD'?'selected':''}>Udda v.</option>
          <option value="EVEN" ${filter==='EVEN'?'selected':''}>Jämn v.</option>
        </select>
        <input type="text" value="${time}" placeholder="HH:MM" style="width:60px" onchange="updateGenEntry('${day}',${i},'time',this.value);previewGen()">
        <input type="text" class="gen-title" value="${title}" placeholder="Titel" oninput="updateGenEntry('${day}',${i},'title',this.value);previewGen()">
        <button class="gen-rm" onclick="removeGenEntry('${day}',${i})">✕</button>
      </div>`;
    }).join('');
    return `<div class="gen-day">
      <div class="gen-day-header"><strong>${day}</strong></div>
      ${rows}
      <button class="gen-add" onclick="addGenEntry('${day}')">+ Lägg till</button>
    </div>`;
  }).join('');

  body.innerHTML = html;
  previewGen();
}

function updateGenEntry(day, idx, field, val) {
  if (!genPatterns[day]) return;
  const e = genPatterns[day][idx];
  if (field==='filter') { e.filter = val === 'ALL' ? undefined : val; if (!e.filter) delete e.filter; }
  if (field==='time') e.time = val;
  if (field==='title') e.title = val;
}

function removeGenEntry(day, idx) {
  if (!genPatterns[day]) return;
  genPatterns[day].splice(idx, 1);
  if (genPatterns[day].length === 0) delete genPatterns[day];
  renderGenModal();
}

function addGenEntry(day) {
  if (!genPatterns[day]) genPatterns[day] = [];
  genPatterns[day].push({title:'', time:'10:00'});
  renderGenModal();
}

function generateEventList() {
  const from = document.getElementById('gen-from')?.value;
  const to = document.getElementById('gen-to')?.value;
  if (!from || !to) return [];
  const results = [];
  const d = new Date(from + 'T00:00:00');
  const end = new Date(to + 'T00:00:00');
  const jsDayToLabel = [6,0,1,2,3,4,5];
  const labelFromJs = js => dayLabels[jsDayToLabel[js]];

  while (d <= end) {
    const dayLabel = labelFromJs(d.getDay());
    const entries = genPatterns[dayLabel] || [];
    const wn = getWeekNumber(d);
    entries.forEach(e => {
      const filter = e.filter || 'ALL';
      const title = e.title;
      if (!title) return;
      if (filter === 'ODD' && wn % 2 === 0) return;
      if (filter === 'EVEN' && wn % 2 !== 0) return;
      results.push({ date: localDate(d), time: e.time, title, category: e.category||'Weekday', expectedTasks: e.expectedTasks||[], promoSlides: e.promoSlides||[], infoLink: e.infoLink||'' });
    });
    d.setDate(d.getDate() + 1);
  }
  return results;
}

function previewGen() {
  const list = generateEventList();
  const area = document.getElementById('gen-preview-area');
  if (!area) return;
  if (list.length === 0) {
    area.innerHTML = '<p class="gen-count" style="padding:8px">Inga händelser att generera</p>';
    return;
  }
  area.innerHTML = `<p class="gen-count" style="margin-bottom:8px"><strong>${list.length}</strong> händelser</p>
    <div class="gen-preview" style="max-height:none">${list.map(e =>
    `<div class="gen-preview-row"><span class="gp-date">${e.date}</span><span class="gp-time">${e.time}</span><span class="gp-title">${e.title}</span></div>`
  ).join('')}</div>`;
}

function executeGenerate() {
  const list = generateEventList();
  if (list.length === 0) { alert('Inga händelser att generera. Förhandsgranska först.'); return; }
  let maxId = db.events.reduce((m,e) => Math.max(m,e.id), 0);
  let added = 0;
  list.forEach(e => {
    if (db.events.some(x => x.date===e.date && x.time===e.time && x.title===e.title)) return;
    maxId++;
    const ev = {id:maxId, title:e.title, category:e.category, date:e.date, time:e.time, description:'', volunteers:0, promoSlides:JSON.parse(JSON.stringify(e.promoSlides)), infoLink:e.infoLink, expectedTasks:JSON.parse(JSON.stringify(e.expectedTasks))};
    db.events.push(ev);
    assignments[ev.id] = {};
    added++;
  });
  db.recurring_events = genPatterns;
  closeGenModal();
  persist('events');
  persist('recurring_events');
  applyFilters();
  alert(`${added} händelser genererade!`);
}

// ── HASH ROUTING ──────────────────────────────────────────────────────────────
function updateHash() {
  let hash = '#' + currentTab;
  if (currentTab === 'events' && currentView === 'monster') hash += '/schedule';
  if (currentTab === 'events' && currentView === 'calendar') hash += '/calendar';
  if (currentTab === 'events' && currentView === 'week') hash += '/week';
  if (currentTab === 'events' && currentView === 'year') hash += '/year';
  if (selectedId) hash += '/' + selectedId;
  if (location.hash !== hash) history.replaceState(null, '', hash);
}

function applyHash() {
  const hash = location.hash.replace(/^#/, '');
  if (!hash) return;
  const parts = hash.split('/');
  const tab = parts[0];
  if (!tabConfig[tab]) return;

  switchTab(tab, true);

  if (tab === 'slides' && parts[1] === 'fullscreen') {
    enterSlidesFullscreen();
    return;
  }

  if (tab === 'namnskyltar' && parts[1] === 'fullscreen') {
    const taskId = parts[2] ? parseInt(parts[2]) : null;
    enterNameplateFullscreen(taskId);
    return;
  }

  const viewMap = {schedule:'monster', calendar:'calendar', week:'week', year:'year'};
  if (tab === 'events' && viewMap[parts[1]]) {
    setView(viewMap[parts[1]]);
    if (parts[2]) {
      const id = parseInt(parts[2]);
      if (id && db.events?.find(e=>e.id===id)) selectRow(id);
    }
  } else if (parts[1] && !viewMap[parts[1]]) {
    const id = parseInt(parts[1]);
    if (id && db[tab]?.find(r=>r.id===id)) selectRow(id);
  }
}

window.addEventListener('hashchange', applyHash);

// ── INIT ──────────────────────────────────────────────────────────────────────
const API = '/api/';

function persist(key) {
  // save a single collection, or entire db if no key
  const url = key ? API + key : API;
  const body = key ? JSON.stringify(db[key]) : JSON.stringify(db);
  fetch(url, {method:'PUT', headers:{'Content-Type':'application/json'}, body})
    .catch(err => console.warn('Persist failed:', err));
}

function loadAssignments() {
  const saved = db.schedules || {};
  db.events.forEach(e => { assignments[e.id] = {}; });
  // saved format: { eventId: { taskId: {type, id/ids} } }
  Object.entries(saved).forEach(([eid, tasks]) => {
    const numEid = parseInt(eid);
    if (!assignments[numEid]) assignments[numEid] = {};
    Object.entries(tasks).forEach(([tid, asgn]) => {
      assignments[numEid][parseInt(tid)] = asgn;
    });
  });
}

fetch(API)
  .then(r => r.json())
  .then(data => {
    db = data;
    loadAssignments();
    document.getElementById('sim-date').value = simDate || localDate(new Date());
    updateSimWarning();
    document.getElementById('view-toggle').style.display = '';
    document.getElementById('btn-generate').style.display = '';
    renderFilter();
    renderYearPicker();
    applyFilters();
    applyHash();
  })
  .catch(err => {
    // fallback: try loading data.json directly (for file:// or no server)
    fetch('data_prod.json').then(r=>r.json()).then(data => {
      db = data;
      loadAssignments();
      document.getElementById('view-toggle').style.display = '';
      document.getElementById('btn-generate').style.display = '';
      renderFilter();
      renderYearPicker();
      applyFilters();
      applyHash();
    }).catch(err2 => {
      document.getElementById('stats-bar').innerHTML =
        `<span class="stat" style="color:#ef4444">⚠ Failed to load data — run: node server.js</span>`;
      console.error(err2);
    });
  });
</script>
