<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mötesplanering 4</title>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; font-size: 14px; background: #f4f5f7; color: #1a1a2e; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
nav { display: flex; align-items: center; background: #1a1a2e; color: #fff; padding: 0 16px; height: 44px; gap: 4px; flex-shrink: 0; }
nav .brand { font-weight: 700; font-size: 15px; margin-right: 16px; color: #a78bfa; }
nav button { background: none; border: none; color: #ccc; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; }
nav button:hover { background: #2d2d4e; color: #fff; }
nav button.active { background: #4f46e5; color: #fff; }
nav .spacer { flex: 1; }
nav .logout { color: #f87171; }
.workspace { display: flex; flex: 1; overflow: hidden; }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.toolbar { display: flex; align-items: center; gap: 8px; padding: 10px 16px; background: #fff; border-bottom: 1px solid #e5e7eb; flex-shrink: 0; }
.toolbar h2 { font-size: 15px; font-weight: 600; }
.toolbar input[type=search] { border: 1px solid #d1d5db; border-radius: 6px; padding: 5px 10px; font-size: 13px; width: 200px; outline: none; }
.toolbar input[type=search]:focus { border-color: #4f46e5; }
.toolbar select { border: 1px solid #d1d5db; border-radius: 6px; padding: 5px 8px; font-size: 13px; outline: none; }
.btn { background: #4f46e5; color: #fff; border: none; border-radius: 6px; padding: 6px 14px; font-size: 13px; cursor: pointer; }
.btn:hover { background: #4338ca; }
.btn-ghost { background: none; border: 1px solid #d1d5db; color: #374151; border-radius: 6px; padding: 5px 12px; font-size: 13px; cursor: pointer; }
.btn-ghost:hover { background: #f3f4f6; }
.btn-danger { background: #ef4444; color: #fff; border: none; border-radius: 6px; padding: 6px 14px; font-size: 13px; cursor: pointer; }
.btn-danger:hover { background: #dc2626; }
.stats-bar { display: flex; gap: 16px; padding: 8px 16px; background: #fff; border-bottom: 1px solid #e5e7eb; flex-shrink: 0; }
.stat { font-size: 12px; color: #6b7280; }
.stat strong { color: #1a1a2e; }
.table-wrap { flex: 1; overflow: auto; }
table { width: 100%; border-collapse: collapse; }
thead th { position: sticky; top: 0; z-index: 3; background: #f9fafb; border-bottom: 2px solid #e5e7eb; padding: 9px 14px; text-align: left; font-size: 12px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: .04em; cursor: pointer; user-select: none; white-space: nowrap; }
thead th:hover { background: #f3f4f6; }
thead th .si { margin-left: 4px; opacity: .4; }
thead th.sorted .si { opacity: 1; color: #4f46e5; }
tbody tr { border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: background .1s; }
tbody tr:hover { background: #f0f0ff; }
tbody tr.selected { background: #ede9fe; }
tbody td { padding: 9px 14px; }
.monster tbody td { padding: 5px 6px; }
.monster thead th { min-width: 120px; padding: 7px 6px; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 600; }
.badge-sunday  { background: #dbeafe; color: #1d4ed8; }
.badge-weekday { background: #d1fae5; color: #065f46; }
.badge-special { background: #fef3c7; color: #92400e; }
.badge-anteckning { background: #f3f4f6; color: #6b7280; }
.badge-yes { background: #d1fae5; color: #065f46; }
.badge-no  { background: #f3f4f6; color: #6b7280; }
</style>
<style>
/* SIDEBAR */
.sidebar { width: 360px; background: #fff; border-left: 1px solid #e5e7eb; display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
.sidebar-header { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid #e5e7eb; gap: 8px; flex-shrink: 0; }
.sidebar-header h3 { flex: 1; font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sidebar-close { background: none; border: none; cursor: pointer; color: #9ca3af; font-size: 20px; line-height: 1; }
.sidebar-close:hover { color: #374151; }
.sidebar-body { flex: 1; overflow-y: auto; padding: 16px; }
.field-group { margin-bottom: 14px; }
.field-group label { display: block; font-size: 11px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 4px; }
.field-group input, .field-group textarea, .field-group select { width: 100%; border: 1px solid #d1d5db; border-radius: 6px; padding: 7px 10px; font-size: 13px; font-family: inherit; outline: none; resize: vertical; }
.field-group input:focus, .field-group textarea:focus, .field-group select:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px #ede9fe; }
.checkbox-row { display: flex; align-items: center; gap: 8px; font-size: 13px; padding: 4px 0; }
.sidebar-footer { padding: 12px 16px; border-top: 1px solid #e5e7eb; display: flex; gap: 8px; flex-shrink: 0; }
.sb-section { margin-top: 18px; padding-top: 14px; border-top: 1px solid #f0f0f0; }
.sb-section h4 { font-size: 11px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 10px; }
.mini-list { list-style: none; }
.mini-list li { padding: 6px 0; border-bottom: 1px solid #f9fafb; font-size: 13px; display: flex; justify-content: space-between; gap: 8px; }
.mini-list li:last-child { border: none; }
.mini-list .who { color: #6b7280; }
.empty-sidebar { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #9ca3af; gap: 10px; text-align: center; padding: 24px; }

/* MONSTER TABLE */
.monster table { width: auto; min-width: 100%; }
.monster thead th.th-event { min-width: 180px; position: sticky; left: 0; z-index: 4; background: #f9fafb; }
.monster tbody td.td-event { position: sticky; left: 0; background: #fff; z-index: 1; font-weight: 500; white-space: nowrap; }
.monster tbody tr.selected td.td-event { background: #ede9fe; }
.monster tbody tr:hover td.td-event { background: #f0f0ff; }
.cell-pick { width: 100%; border: 1px solid #e5e7eb; border-radius: 5px; padding: 4px 6px; font-size: 12px; background: #fff; outline: none; cursor: pointer; color: #374151; }
.cell-pick:focus { border-color: #4f46e5; box-shadow: 0 0 0 2px #ede9fe; }
.cell-pick.unset { color: #9ca3af; background: #fafafa; }
.th-task-label { font-size: 11px; }
.th-task-type { font-size: 10px; font-weight: 400; color: #9ca3af; text-transform: none; letter-spacing: 0; margin-top: 2px; }
.view-toggle { display: flex; gap: 2px; background: #f3f4f6; border-radius: 6px; padding: 2px; }
.view-toggle button { background: none; border: none; padding: 4px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; color: #6b7280; }
.view-toggle button.active { background: #fff; color: #1a1a2e; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
.schedule-badge { background: #f59e0b; color: #fff; font-size: 10px; font-weight: 700; padding: 1px 0; border-radius: 99px; margin-left: 4px; display: inline-block; width: 22px; text-align: center; }

/* CHECKBOX POPOVER for multi-person cells */
.pop-cell { position: relative; }
.pop-label { padding: 4px 6px; border: 1px solid #e5e7eb; border-radius: 5px; font-size: 12px; cursor: pointer; background: #fff; color: #374151; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
.pop-label:hover { border-color: #4f46e5; }
.pop-label.unset { color: #9ca3af; background: #fafafa; }
.pop-panel { display: none; position: absolute; top: calc(100% + 4px); left: 0; z-index: 20; background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,.12); padding: 0; min-width: 220px; max-height: 280px; display: none; flex-direction: column; }
.pop-panel.open { display: flex; }
.pop-search { border: none; border-bottom: 1px solid #e5e7eb; padding: 8px 10px; font-size: 13px; outline: none; border-radius: 8px 8px 0 0; flex-shrink: 0; }
.pop-search:focus { box-shadow: inset 0 -2px 0 #4f46e5; }
.pop-list { overflow-y: auto; padding: 4px 8px; flex: 1; }
.pop-panel label { display: flex; align-items: center; gap: 8px; padding: 4px 6px; border-radius: 4px; cursor: pointer; font-size: 13px; color: #374151; }
.pop-panel label:hover { background: #f3f4f6; }
.pop-panel input[type=checkbox] { accent-color: #4f46e5; }
.pop-add { border: none; border-top: 1px solid #e5e7eb; background: none; padding: 8px 10px; font-size: 12px; color: #4f46e5; cursor: pointer; text-align: left; flex-shrink: 0; border-radius: 0 0 8px 8px; }
.pop-add:hover { background: #f0f0ff; }

/* SLIDES TAB */
.slides-wrap { flex: 1; overflow: hidden; background: #111; display: flex; align-items: center; justify-content: center; position: relative; }
.slide { position: absolute; inset: 0; opacity: 0; transition: opacity .8s ease; pointer-events: none; display: flex; flex-direction: column; }
.slide.active { opacity: 1; pointer-events: auto; }
/* Week overview slide */
.slide-week { display: flex; flex-direction: column; width: 100%; height: 100%; background: #111; color: #e5e5e5; }
.slide-week-header { padding: 2.5vh 3vw 0; flex-shrink: 0; text-align: center; margin-bottom: 40px; }
.slide-week-header h2 { font-size: clamp(24px, 3.5vw, 56px); font-weight: 800; color: #fff; margin: 0; letter-spacing: -.01em; }
.slide-columns { display: flex; flex: 1; padding: 0 2vw 2vh; gap: 1.5vw; overflow: hidden; }
.slide-col { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.slide-col-day { font-size: clamp(16px, 2.2vw, 36px); font-weight: 700; color: #fff; padding-bottom: .5vh; border-bottom: 2px solid #444; margin-bottom: 1.5vh; }
.slide-col-events { display: flex; flex-direction: column; gap: 1.2vh; }
.slide-ev { animation: slideEvIn .5s ease both; }
.slide-ev-title { font-size: clamp(14px, 1.8vw, 30px); font-weight: 700; color: #e5e5e5; line-height: 1.15; }
.slide-ev-meta { font-size: clamp(11px, 1.1vw, 20px); color: #777; margin-top: .2vh; }
.slide-ev-meta .ev-time { color: #aaa; font-weight: 600; }
@keyframes slideEvIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
/* Week slide footer */
.slide-footer { flex-shrink: 0; display: flex; align-items: center; padding: 1.5vh 3vw; }
.slide-clock { color: #fff; font-size: clamp(20px, 2.5vw, 42px); font-weight: 700; font-variant-numeric: tabular-nums; }
.slide-logo { margin-left: auto; height: clamp(35px, 4.4vh, 70px); }
.slide-logo img { height: 100%; width: auto; opacity: .8; }
/* Promo slide */
.slide-promo { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #111; }
.slide-promo img { width: 100%; height: 100%; object-fit: contain; }
/* Controls */
.slide-controls { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; align-items: center; z-index: 2; }
.slide-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,.2); cursor: pointer; border: none; padding: 0; transition: all .2s; }
.slide-dot.active { background: #fff; width: 20px; border-radius: 4px; }
.slide-pause { background: none; border: none; color: rgba(255,255,255,.3); cursor: pointer; font-size: 16px; margin-left: 8px; display: inline-flex; align-items: center; }
.slide-pause:hover { color: #fff; }
.slide-progress { position: absolute; top: 0; left: 0; height: 3px; background: rgba(255,255,255,.5); z-index: 3; transition: none; }
.slide-progress.animating { transition: width linear; }
body.slides-fullscreen nav,
body.slides-fullscreen .toolbar,
body.slides-fullscreen .stats-bar,
body.slides-fullscreen .sidebar,
body.slides-fullscreen .sim-warning { display: none !important; }
body.slides-fullscreen .workspace { height: 100vh; }
body.slides-fullscreen .slides-wrap { position: fixed; inset: 0; z-index: 999; }
body.nameplate-fullscreen nav,
body.nameplate-fullscreen .toolbar,
body.nameplate-fullscreen .stats-bar,
body.nameplate-fullscreen .sidebar,
body.nameplate-fullscreen .sim-warning { display: none !important; }
body.nameplate-fullscreen .workspace { height: 100vh; }
body.nameplate-fullscreen #namnskyltar-area { position: fixed; inset: 0; z-index: 999; background: #111; display: flex !important; align-items: flex-end; justify-content: flex-start; }
.nameplate-full { padding: 4vw 5vw; color: #fff; }
.nameplate-full .np-name { font-family: system-ui, sans-serif; font-size: min(8vw, 96px); font-weight: 800; text-transform: uppercase; letter-spacing: .05em; line-height: 1.1; white-space: nowrap; }
.nameplate-full .np-line { border: 2px solid #fff; border-radius: 99px; width: 102%; margin: .8vh 0; }
.nameplate-full .np-role { font-family: system-ui, sans-serif; font-size: min(3.5vw, 42px); font-weight: 300; margin-left: .2em; opacity: .85; }
.export-wrap { flex: 1; overflow-y: auto; padding: 24px; background: #f4f5f7; display: flex; flex-direction: column; align-items: center; }
.export-toolbar { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; }
.export-preview { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 24px 32px; max-width: 400px; width: 100%; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
.export-code { position: absolute; left: -9999px; opacity: 0; height: 0; overflow: hidden; }

/* GENERATE MODAL */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 100; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: #fff; border-radius: 12px; box-shadow: 0 12px 40px rgba(0,0,0,.2); width: 640px; max-height: 85vh; display: flex; flex-direction: column; }
.modal-header { display: flex; align-items: center; padding: 16px 20px; border-bottom: 1px solid #e5e7eb; }
.modal-header h3 { flex: 1; font-size: 16px; font-weight: 600; }
.modal-body { flex: 1; overflow-y: auto; padding: 20px; }
.modal-footer { padding: 14px 20px; border-top: 1px solid #e5e7eb; display: flex; gap: 8px; justify-content: flex-end; }
.gen-day { margin-bottom: 16px; }
.gen-day-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.gen-day-header strong { font-size: 13px; color: #1a1a2e; min-width: 50px; }
.gen-row { display: flex; align-items: center; gap: 6px; padding: 4px 0 4px 16px; font-size: 13px; }
.gen-row select { border: 1px solid #d1d5db; border-radius: 5px; padding: 3px 6px; font-size: 12px; outline: none; }
.gen-row input { border: 1px solid #d1d5db; border-radius: 5px; padding: 3px 6px; font-size: 12px; outline: none; width: 60px; }
.gen-row input.gen-title { width: 180px; }
.gen-row .gen-rm { background: none; border: none; color: #9ca3af; cursor: pointer; font-size: 14px; }
.gen-row .gen-rm:hover { color: #ef4444; }
.gen-add { background: none; border: none; color: #4f46e5; cursor: pointer; font-size: 12px; padding: 2px 0; margin-left: 16px; }
.gen-add:hover { text-decoration: underline; }
.gen-range { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; font-size: 13px; }
.gen-range label { font-weight: 600; color: #6b7280; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; }
.gen-range input { border: 1px solid #d1d5db; border-radius: 6px; padding: 6px 10px; font-size: 13px; outline: none; }
.gen-preview { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; padding: 12px; margin-top: 12px; max-height: 200px; overflow-y: auto; font-size: 12px; }
.gen-preview-row { padding: 3px 0; display: flex; gap: 8px; }
.gen-preview-row .gp-date { color: #6b7280; min-width: 80px; }
.gen-preview-row .gp-time { color: #4f46e5; min-width: 44px; }
.gen-preview-row .gp-title { color: #1a1a2e; }
.gen-count { font-size: 12px; color: #6b7280; margin-top: 8px; }

/* WARNING CELLS */
.cell-warn { outline: 2px solid #f59e0b; outline-offset: -2px; border-radius: 5px; background: #fffbeb; }
.cell-pick.cell-warn { border-color: #f59e0b; background: #fffbeb; }
.pop-label.cell-warn { border-color: #f59e0b; background: #fffbeb; }
.warn-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #f59e0b; margin-right: 4px; }
.warn-count { font-size: 12px; color: #f59e0b; font-weight: 600; }

/* CATEGORY TASKS CONFIG */
.cat-config { padding: 16px; }
.cat-config h4 { font-size: 12px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 12px; }
.cat-section { margin-bottom: 16px; }
.cat-section-label { font-size: 13px; font-weight: 600; color: #1a1a2e; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
.cat-task-list { padding-left: 4px; }
.cat-task-list label { display: flex; align-items: center; gap: 8px; padding: 3px 6px; border-radius: 4px; cursor: pointer; font-size: 13px; color: #374151; }
.cat-task-list label:hover { background: #f3f4f6; }
.cat-task-list input[type=checkbox] { accent-color: #4f46e5; }

/* DIRTY SAVE BUTTON */
.btn-save { background: #d1d5db; color: #6b7280; border: none; border-radius: 6px; padding: 6px 14px; font-size: 13px; cursor: default; transition: all .15s; }
.btn-save.dirty { background: #4f46e5; color: #fff; cursor: pointer; animation: pulse-save .4s ease; }
.btn-save.dirty:hover { background: #4338ca; }
@keyframes pulse-save { 0%{transform:scale(1)} 50%{transform:scale(1.05)} 100%{transform:scale(1)} }

/* CONTEXT MENU */
.ctx-menu { position: fixed; z-index: 200; background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,.15); padding: 4px; min-width: 160px; }
.ctx-menu button { display: flex; align-items: center; gap: 8px; width: 100%; background: none; border: none; padding: 7px 12px; font-size: 13px; color: #374151; cursor: pointer; border-radius: 4px; text-align: left; }
.ctx-menu button:hover { background: #f3f4f6; }
.ctx-menu button.ctx-danger { color: #ef4444; }
.ctx-menu button.ctx-danger:hover { background: #fef2f2; }
.lucide-icon { display: inline-block; vertical-align: middle; }
.team-gear { background: none; border: none; cursor: pointer; color: #9ca3af; padding: 2px; border-radius: 3px; display: flex; align-items: center; }
.team-gear:hover { color: #4f46e5; background: #ede9fe; }
.pop-add-area { flex-shrink: 0; }
.td-actions { width: 40px; text-align: center; padding: 0 4px; }
.actions-btn { background: none; border: none; cursor: pointer; color: #9ca3af; padding: 4px; border-radius: 4px; display: inline-flex; align-items: center; justify-content: center; }
.actions-btn:hover { color: #374151; background: #f3f4f6; }
tbody tr.current-week { background: #f0fdf4; }
tbody tr.current-week:hover { background: #dcfce7; }
tbody tr.current-week.selected { background: #d9f0e6; }
.monster tbody tr.current-week td.td-event { background: #f0fdf4; }
.monster tbody tr.current-week:hover td.td-event { background: #dcfce7; }
.monster tbody tr.current-week.selected td.td-event { background: #d9f0e6; }

/* CALENDAR VIEW */
.cal-scroll { height: 100%; overflow-y: auto; }
.cal-month-section { display: flex; flex-direction: column; }
.cal-month-label { background: #f9fafb; padding: 8px 12px; font-size: 15px; font-weight: 700; color: #374151; position: sticky; top: 0; z-index: 3; border-bottom: 1px solid #e5e7eb; flex-shrink: 0; }
.cal-month-label span { font-weight: 400; color: #9ca3af; margin-left: 4px; }
.cal-grid { display: grid; grid-template-columns: 36px repeat(7, 1fr); gap: 1px; background: #e5e7eb; flex: 1; }
.cal-header { position: sticky; top: 37px; z-index: 2; background: #f9fafb; padding: 8px 6px; font-size: 11px; font-weight: 600; color: #6b7280; text-transform: uppercase; text-align: center; }
.cal-wk { background: #f9fafb; display: flex; align-items: flex-start; justify-content: center; padding-top: 6px; font-size: 11px; font-weight: 600; color: #9ca3af; }
.cal-cell { background: #fff; min-height: 100px; padding: 4px 6px; font-size: 12px; vertical-align: top; }
.cal-cell.outside { background: #fafafa; color: #d1d5db; }
.cal-cell.today { outline: 2px solid #4f46e5; outline-offset: -2px; z-index: 1; }
.cal-cell.current-week-cell { background: #f0fdf4; }
.cal-cell.drag-over { background: #ede9fe; outline: 2px dashed #4f46e5; outline-offset: -2px; }
.cal-day-num { font-weight: 600; font-size: 12px; color: #374151; margin-bottom: 2px; }
.cal-cell.outside .cal-day-num { color: #d1d5db; }
.cal-ev { padding: 2px 4px; margin-bottom: 1px; border-radius: 3px; font-size: 11px; cursor: grab; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; word-break: break-word; }
.cal-ev:hover { filter: brightness(0.92); }
.cal-ev.dragging { opacity: 0.4; }
.cal-ev-sunday { background: #dbeafe; color: #1d4ed8; }
.cal-ev-weekday { background: #d1fae5; color: #065f46; }
.cal-ev-special { background: #fef3c7; color: #92400e; }
.cal-ev-anteckning { background: #f3f4f6; color: #9ca3af; }
.cal-more { font-size: 10px; color: #6b7280; cursor: pointer; padding: 1px 4px; }
.cal-more:hover { color: #4f46e5; }
.cal-nav { display: flex; align-items: center; gap: 12px; padding: 8px 0; }
.cal-nav .cal-title { flex: 1; font-size: 18px; }
.cal-nav .cal-title b { font-weight: 700; }
.cal-nav .cal-title span { font-weight: 400; color: #6b7280; }
.cal-nav button { background: none; border: 1px solid #d1d5db; border-radius: 6px; padding: 4px 10px; font-size: 12px; cursor: pointer; color: #374151; }
.cal-nav button:hover { background: #f3f4f6; }
/* WEEK VIEW */
.week-scroll { height: 100%; overflow-y: auto; }
.week-container { display: flex; flex-direction: column; }
.week-section { min-height: 100%; display: flex; flex-direction: column; border-bottom: 1px solid #e5e7eb; }
.week-section-header { position: sticky; top: 0; z-index: 2; background: #f9fafb; padding: 8px 12px; font-size: 14px; font-weight: 700; color: #374151; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.week-section-header span { font-weight: 400; color: #9ca3af; font-size: 12px; }
.week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: #e5e7eb; flex: 1; }
.week-day-headers { display: contents; }
.week-day-hdr { background: #f9fafb; padding: 4px 6px; font-size: 10px; font-weight: 600; color: #9ca3af; text-transform: uppercase; text-align: center; }
.week-col { background: #fff; min-height: 80px; padding: 6px; }
.week-col.today { outline: 2px solid #4f46e5; outline-offset: -2px; }
.week-col.drag-over { background: #ede9fe; outline: 2px dashed #4f46e5; outline-offset: -2px; }
.week-col-header { font-size: 11px; font-weight: 600; color: #6b7280; text-transform: uppercase; margin-bottom: 4px; }
.week-col-header .week-date { display: inline; font-size: 14px; color: #374151; text-transform: none; font-weight: 700; margin-left: 4px; }
.week-col-header.today-hdr { color: #4f46e5; }
.week-col-header.today-hdr .week-date { color: #4f46e5; }
.week-ev { padding: 6px 8px; margin-bottom: 4px; border-radius: 5px; font-size: 12px; cursor: grab; }
.week-ev:hover { filter: brightness(0.92); }
.week-ev.dragging { opacity: 0.4; }
.week-ev-time { font-weight: 600; font-size: 11px; }
.week-ev-title { margin-top: 2px; }
/* YEAR VIEW */
.year-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; padding: 16px; }
.year-month { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 10px; }
.year-month-title { font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; text-align: center; }
.year-mini-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; font-size: 10px; text-align: center; }
.year-mini-hdr { color: #9ca3af; font-weight: 600; padding: 2px 0; }
.year-mini-day { padding: 4px 0 6px; color: #6b7280; border-radius: 3px; cursor: default; position: relative; }
.year-mini-day.outside { color: #d1d5db; }
.year-mini-day.today { background: #4f46e5; color: #fff; font-weight: 700; }
.year-mini-day.has-events { font-weight: 700; color: #1a1a2e; cursor: pointer; }
.year-mini-day.has-events::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; border-radius: 50%; background: #4f46e5; }
.year-mini-day.has-events:hover { background: #ede9fe; }
.year-mini-day:not(.outside):hover { background: #f3f4f6; }

/* TEAM BOARD */
.team-board-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.team-board-toolbar { display: flex; gap: 4px; padding: 10px 16px; border-bottom: 1px solid #e5e7eb; background: #fff; flex-shrink: 0; align-items: center; flex-wrap: wrap; }
.tb-task-link { background: none; border: 1px solid #e5e7eb; border-radius: 6px; padding: 5px 12px; font-size: 13px; cursor: pointer; color: #6b7280; transition: all .15s; display: inline-flex; align-items: center; gap: 4px; }
.tb-task-link:hover { background: #f3f4f6; color: #374151; }
.tb-task-link.active { background: #4f46e5; color: #fff; border-color: #4f46e5; }
.tb-task-link.tb-task-add { border-style: dashed; color: #9ca3af; }
.tb-task-link.tb-task-add:hover { border-color: #4f46e5; color: #4f46e5; }
.team-board { display: flex; gap: 1px; background: #e5e7eb; flex: 1; overflow-x: auto; }
.team-col { background: #f9fafb; min-width: 200px; flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.team-col.pool-col { min-width: 240px; max-width: 280px; flex: none; background: #fff; }
.team-col-header { padding: 10px 12px; font-size: 13px; font-weight: 700; color: #374151; border-bottom: 1px solid #e5e7eb; flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; }
.team-col-header .team-col-count { font-weight: 400; color: #9ca3af; font-size: 12px; }
.team-col-body { flex: 1; overflow-y: auto; padding: 6px; }
.team-col-body.drag-over { background: #ede9fe; }
.team-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 6px; padding: 6px 10px; margin-bottom: 4px; font-size: 13px; cursor: grab; display: flex; align-items: center; gap: 6px; }
.team-card:hover { border-color: #4f46e5; background: #f8f7ff; }
.team-card.dragging { opacity: 0.4; }
.team-card .card-remove { background: none; border: none; color: #d1d5db; cursor: pointer; margin-left: auto; padding: 2px; border-radius: 4px; display: flex; align-items: center; transition: all .15s; }
.team-card .card-remove:hover { color: #ef4444; background: #fef2f2; }
.team-col-header .card-remove { background: none; border: none; color: #d1d5db; cursor: pointer; padding: 2px; border-radius: 4px; display: flex; align-items: center; transition: all .15s; }
.team-col-header .card-remove:hover { color: #ef4444; background: #fef2f2; }
.pool-search { width: 100%; border: none; border-bottom: 1px solid #e5e7eb; padding: 8px 12px; font-size: 13px; outline: none; }
.pool-search:focus { box-shadow: inset 0 -2px 0 #4f46e5; }
.pool-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 6px; padding: 5px 10px; margin-bottom: 3px; font-size: 12px; cursor: grab; color: #6b7280; }
.pool-card:hover { border-color: #4f46e5; color: #374151; }
.pool-card.dragging { opacity: 0.4; }
.pool-card.in-team { opacity: 0.35; font-style: italic; }

/* MAILBOT */
.mailbot-wrap { flex: 1; overflow-y: auto; padding: 24px; background: #f4f5f7; }
.mb-summary { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
.mb-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 16px 20px; min-width: 160px; }
.mb-card-num { font-size: 28px; font-weight: 700; color: #374151; }
.mb-card-label { font-size: 12px; color: #6b7280; margin-top: 2px; }
.mb-card.warn .mb-card-num { color: #f59e0b; }
.mb-card.danger .mb-card-num { color: #ef4444; }
.mb-card.ok .mb-card-num { color: #10b981; }
.mb-event { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; margin-bottom: 8px; overflow: hidden; }
.mb-event-header { padding: 10px 14px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #f0f0f0; }
.mb-event-date { font-size: 12px; color: #6b7280; font-family: ui-monospace, monospace; min-width: 100px; }
.mb-event-title { font-size: 13px; font-weight: 600; color: #374151; flex: 1; }
.mb-event-status { font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: 600; }
.mb-status-ok { background: #d1fae5; color: #065f46; }
.mb-status-warn { background: #fef3c7; color: #92400e; }
.mb-status-danger { background: #fee2e2; color: #991b1b; }
.mb-people { padding: 8px 14px; display: flex; flex-wrap: wrap; gap: 6px; }
.mb-person { font-size: 12px; padding: 3px 8px; border-radius: 4px; display: inline-flex; align-items: center; gap: 4px; }
.mb-person.has-email { background: #d1fae5; color: #065f46; }
.mb-person.no-email { background: #fee2e2; color: #991b1b; cursor: pointer; }
.mb-person.no-email:hover { background: #fecaca; }
</style>
</head>
<body>

<nav>
  <span class="brand">Mötesplanering 4</span>
  <button onclick="switchTab('contacts')" id="tab-contacts">Contacts</button>
  <button onclick="switchTab('tasks')"    id="tab-tasks">Tasks</button>
  <button onclick="switchTab('categories')" id="tab-categories">Categories</button>
  <button onclick="switchTab('teams')"    id="tab-teams">Teams</button>
  <button onclick="switchTab('events')"   id="tab-events" class="active">Events</button>
  <button onclick="switchTab('slides')"   id="tab-slides">Slides</button>
  <button onclick="switchTab('export')"   id="tab-export">Export</button>
  <button onclick="switchTab('mailbot')"  id="tab-mailbot">Mailbot</button>
  <button onclick="switchTab('namnskyltar')" id="tab-namnskyltar">Namnskyltar</button>
  <span class="spacer"></span>
  <input type="date" id="sim-date" onchange="setSimDate(this.value)" style="border:1px solid #444;background:#2d2d4e;color:#ccc;border-radius:6px;padding:4px 8px;font-size:12px">
  <button class="logout">Logout</button>
</nav>

<div class="workspace">
  <div class="main">
    <div class="toolbar" id="toolbar">
      <h2 id="section-title">Events</h2>
      <div class="view-toggle" id="view-toggle" style="display:none">
        <button id="vt-list" onclick="setView('list')" class="active">List</button>
        <button id="vt-calendar" onclick="setView('calendar')">Month</button>
        <button id="vt-week" onclick="setView('week')">Week</button>
        <button id="vt-year" onclick="setView('year')">Year</button>
        <button id="vt-monster" onclick="setView('monster')">Schedule <span id="schedule-badge"></span></button>
      </div>
      <select id="year-select" onchange="setYear(this.value)" style="display:none"></select>
      <span style="flex:1"></span>
      <input type="search" id="search-input" placeholder="Search…" oninput="applyFilters()">
      <select id="filter-select" onchange="applyFilters()" style="display:none"></select>
      <button class="btn" id="btn-new" onclick="newRecord()" style="display:none">+ New</button>
      <button class="btn-ghost" id="btn-generate" onclick="openGenModal()" style="display:none">⚡ Generate</button>
    </div>
    <div class="stats-bar" id="stats-bar"></div>

      <table><thead id="table-head"></thead><tbody id="table-body"></tbody></table>
    </div>

    <div class="export-wrap" id="export-area" style="display:none"></div>
    <div class="team-board-wrap" id="team-board-area" style="display:none"></div>
    <div class="team-board-wrap" id="categories-area" style="display:none"></div>
    <div class="mailbot-wrap" id="mailbot-area" style="display:none"></div>
    <div class="mailbot-wrap" id="namnskyltar-area" style="display:none"></div>
  </div>
  <div class="sidebar" id="sidebar">
    <div id="sidebar-content" style="display:flex;flex-direction:column;height:100%">
      <div class="empty-sidebar">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".3"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        <p style="font-size:13px">Select a row to view details</p>

</div>

<!-- Generate Events Modal -->

  <div class="modal" style="width:900px;max-width:95vw">

      <h3>Generera återkommande händelser</h3>

        <p class="gen-count">Ändra mönster eller datum för förhandsgranskning</p>
      </div>

  <div class="modal" style="width:600px;max-height:85vh;overflow:hidden;display:flex;flex-direction:column">
    <div id="detail-modal-content" style="display:flex;flex-direction:column;overflow:hidden;flex:1"></div>
  </div>

<!-- Context Menu -->
<div class="ctx-menu" id="ctx-menu" style="display:none"></div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
function localDate(d) { const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${dd}`; }
function esc(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
function escAttr(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
let simDate = localStorage.getItem('simDate') || null;
function getToday() { return simDate ? new Date(simDate+'T00:00:00') : new Date(); }
function getTodayStr() { return localDate(getToday()); }
function setSimDate(v) {
  simDate = v || null;
  if (simDate) localStorage.setItem('simDate', simDate); else localStorage.removeItem('simDate');
  const el = document.getElementById('sim-date');
  if (el) el.value = simDate || localDate(new Date());
  updateSimWarning();
  if (currentTab==='events') applyFilters();
  if (currentTab==='mailbot') renderMailbot();
  if (currentTab==='slides') renderSlides();
  if (currentTab==='export') renderExport();
}
function clearSimDate() { setSimDate(null); }
function updateSimWarning() {
  let w = document.getElementById('sim-warning');
  if (simDate) {
    if (!w) {
      w = document.createElement('div');
      w.id = 'sim-warning';
      w.style.cssText = 'background:#fef3c7;color:#92400e;font-size:12px;padding:4px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0';
      document.querySelector('.main').prepend(w);
    }
    w.innerHTML = `⚠ Simulerat datum: <strong>${simDate}</strong> — inte dagens datum <button onclick="clearSimDate()" style="background:none;border:1px solid #92400e;border-radius:4px;color:#92400e;padding:1px 8px;font-size:11px;cursor:pointer;margin-left:4px">Återställ</button>`;
    w.style.display = '';
  } else if (w) {
    w.style.display = 'none';
  }
}
let db = {};
let schedules = {};

// ── STATE ─────────────────────────────────────────────────────────────────────
let currentTab = 'events';
let selectedId = null;
let sortCol = null;
let sortDir = 1;
let filtered = [];
let currentView = 'list';
let selectedYear = getToday().getFullYear();
const assignments = {};
let exportMonths = 2;
let exportStartDate = getTodayStr();
let teamBoardTaskId = null;

// ── TAB CONFIG ────────────────────────────────────────────────────────────────
const tabConfig = {
  events: {
    label:'Events',
    cols:[
      {key:'date',      label:'Date',      render:(v,r)=>`<span style="font-size:12px;white-space:nowrap">${v} ${r.time||''}</span>`},
      {key:'weekday',   label:'Day',       render:(v,r)=>{const d=new Date(r.date+'T00:00:00');return ['söndag','måndag','tisdag','onsdag','torsdag','fredag','lördag'][d.getDay()]}},
      {key:'title',     label:'Title',     render:(v,r)=>esc(r.title)},
      {key:'category',  label:'Category',  render:(v,r)=>{const c=(r.category||'Weekday').toLowerCase();return `<span class="badge badge-${c}" style="font-size:11px">${r.category||'Weekday'}</span>`}},
      {key:'description',label:'Description',render:(v,r)=>r.description||'<span style="color:#9ca3af">—</span>'},
      {key:'infoLink',  label:'Info link',  render:(v,r)=>r.infoLink?`<a href="${r.infoLink}" target="_blank" onclick="event.stopPropagation()" style="color:#4f46e5;font-size:12px">${r.infoLink.replace(/^https?:\/\//,'').slice(0,30)}</a>`:'<span style="color:#9ca3af">—</span>'},
    ],
    filter:null,
    stats:d=>{
      const warns = d.reduce((n,ev) => {
        const req = ev.expectedTasks || [];
        return n + req.filter(tid => !assignments[ev.id]?.[tid]).length;
      }, 0);
      const warnHtml = warns > 0 ? ` <span class="stat warn-count">⚠ ${warns} saknas</span>` : '';
      updateScheduleBadge(warns);
      const warnStat = currentView === 'monster' && warns > 0 ? ` <span class="stat warn-count">⚠ ${warns} saknas</span>` : '';
      return `<span class="stat">Total: <strong>${d.length}</strong></span>${warnStat} <button onclick="newEventOnDate(getTodayStr())" style="background:none;border:none;color:#4f46e5;cursor:pointer;font-size:13px;display:inline-flex;align-items:center;gap:4px;padding:0 4px"><i data-lucide="plus-circle" style="width:14px;height:14px"></i> Ny händelse</button>`;
    },
  },
  contacts: {
    label:'Contacts',
    cols:[
      {key:'name', label:'Name', render:v=>v},
      {key:'email',label:'Email',render:v=>`<a href="mailto:${v}" onclick="event.stopPropagation()">${v}</a>`},
      {key:'phone',label:'Phone',render:v=>v||'<span style="color:#9ca3af">—</span>'},
    ],
    filter:null,
    stats:d=>`<span class="stat">Total contacts: <strong>${d.length}</strong></span>
      <button onclick="newContact()" style="background:none;border:none;color:#4f46e5;cursor:pointer;font-size:13px;display:inline-flex;align-items:center;gap:4px;padding:0 4px"><i data-lucide="plus-circle" style="width:14px;height:14px"></i> Ny kontakt</button>`,
  },
  tasks: {
    label:'Tasks',
    cols:[
      {key:'name',    label:'Name',           render:v=>v},
      {key:'teamTask',label:'Team task',       render:v=>`<span class="badge badge-${v?'yes':'no'}">${v?'Yes':'No'}</span>`},
      {key:'mailbot', label:'Mailbot',         render:v=>`<span class="badge badge-${v?'yes':'no'}">${v?'Yes':'No'}</span>`},
      {key:'phrase',  label:'Reminder phrase', render:v=>v?`"${v}"` :'<span style="color:#9ca3af">—</span>'},
    ],
    filter:null,
    stats:d=>`<span class="stat">Total tasks: <strong>${d.length}</strong></span>
      <span class="stat">Mailbot enabled: <strong>${d.filter(t=>t.mailbot).length}</strong></span>
      <button onclick="newTask()" style="background:none;border:none;color:#4f46e5;cursor:pointer;font-size:13px;display:inline-flex;align-items:center;gap:4px;padding:0 4px"><i data-lucide="plus-circle" style="width:14px;height:14px"></i> Ny uppgift</button>`,
  },
  categories: {
    label:'Categories',
    cols:[],
    filter:null,
    stats:()=>'',
  },
  teams: {
    label:'Teams',
    cols:[
      {key:'taskId', label:'Task',   render:v=>db.tasks?.find(t=>t.id===v)?.name||v},
      {key:'number', label:'Team #', render:v=>v},
      {key:'members',label:'Members',render:v=>v.map(id=>db.contacts?.find(c=>c.id===id)?.name).join(', ')||'<span style="color:#9ca3af">—</span>'},
    ],
    filter:null,
    stats:d=>`<span class="stat">Total teams: <strong>${d.length}</strong></span>`,
  },
  slides: {
    label:'Slides',
    cols:[],
    filter:null,
    stats:()=>'',
  },
  export: {
    label:'Export',
    cols:[],
    filter:null,
    stats:()=>'',
  },
  mailbot: {
    label:'Mailbot',
    cols:[],
    filter:null,
    stats:()=>'',
  },
  namnskyltar: {
    label:'Namnskyltar',
    cols:[],
    filter:null,
    stats:()=>'',
  },
};

// ── CORE RENDER ───────────────────────────────────────────────────────────────
function switchTab(tab, skipHash) {
  if (slideTimer) { clearTimeout(slideTimer); slideTimer = null; }
  if (slideClockTimer) { clearInterval(slideClockTimer); slideClockTimer = null; }
  currentTab = tab; selectedId = null; sortCol = null; sortDir = 1;
  document.querySelectorAll('nav button[id^=tab-]').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('section-title').textContent = tabConfig[tab].label;
  document.getElementById('search-input').value = '';

  const isSlides = tab === 'slides';
  const isExport = tab === 'export';
  const isTeams = tab === 'teams';
  const isMailbot = tab === 'mailbot';
  const isNamn = tab === 'namnskyltar';
  const isCats = tab === 'categories';
  const isSpecial = isSlides || isExport || isTeams || isMailbot || isCats || isNamn;
  const isEvents = tab === 'events';
  document.getElementById('table-area').style.display = isSpecial ? 'none' : '';
  document.getElementById('slides-area').style.display = isSlides ? '' : 'none';
  document.getElementById('export-area').style.display = isExport ? '' : 'none';
  document.getElementById('team-board-area').style.display = isTeams ? '' : 'none';
  document.getElementById('categories-area').style.display = isCats ? '' : 'none';
  document.getElementById('mailbot-area').style.display = isMailbot ? '' : 'none';
  document.getElementById('namnskyltar-area').style.display = isNamn ? '' : 'none';
  document.getElementById('search-input').style.display = isSpecial ? 'none' : '';
  document.getElementById('btn-generate').style.display = isEvents ? '' : 'none';
  document.getElementById('view-toggle').style.display = isEvents ? '' : 'none';
  document.getElementById('stats-bar').style.display = isSpecial ? 'none' : '';
  if (!isEvents) currentView = 'list';
  document.getElementById('sidebar').style.display = (isTeams || isMailbot || isCats || isNamn) ? 'none' : '';

  if (isSlides) { renderSlides(); renderSlidesSidebar(); if (!skipHash) updateHash(); return; }
  if (isExport) { renderExport(); renderSidebar(null); if (!skipHash) updateHash(); return; }
  if (isTeams) { renderTeamBoard(); if (!skipHash) updateHash(); return; }
  if (isCats) { renderCategories(); if (!skipHash) updateHash(); return; }
  if (isMailbot) { renderMailbot(); if (!skipHash) updateHash(); return; }
  if (isNamn) { renderNamnskyltar(); if (!skipHash) updateHash(); return; }
  renderFilter();
  renderYearPicker();
  applyFilters();
  renderSidebar(null);
  if (!skipHash) updateHash();
}

function setView(v) {
  currentView = v;
  calScrollInit = false;
  listScrolled = false;
  ['list','calendar','week','year','monster'].forEach(k => {
    const el = document.getElementById('vt-'+k);
    if (el) el.classList.toggle('active', v===k);
  });
  document.querySelector('.table-wrap').classList.toggle('monster', v==='monster');
  const calViews = ['monster','calendar','week','year'];
  document.getElementById('sidebar').style.display = calViews.includes(v) ? 'none' : '';
  if (v !== 'list') { selectedId = null; renderSidebar(null); }
  renderTable();
  updateHash();
}

function updateScheduleBadge(count) {
  const el = document.getElementById('schedule-badge');
  if (!el) return;
  el.className = 'schedule-badge';
  if (count > 0) {
    el.textContent = count > 99 ? '99+' : count;
    el.style.background = '#f59e0b';
  } else {
    el.textContent = '✓';
    el.style.background = '#10b981';
  }
}

function renderFilter() {
  const sel = document.getElementById('filter-select');
  const cfg = tabConfig[currentTab].filter;
  if (!cfg) { sel.style.display='none'; return; }
  sel.style.display='';
  sel.innerHTML = cfg.options.map(o=>`<option>${o}</option>`).join('');
}

function renderYearPicker() {
  const ySel = document.getElementById('year-select');
  if (currentTab !== 'events') { ySel.style.display = 'none'; return; }
  const years = [...new Set((db.events||[]).map(e => e.date.slice(0,4)))].sort();
  if (years.length === 0) { ySel.style.display = 'none'; return; }
  // if current selectedYear has no events, snap to nearest available year
  if (!years.includes(String(selectedYear))) {
    selectedYear = parseInt(years[years.length - 1]);
  }
  ySel.style.display = '';
  ySel.innerHTML = years.map(y => `<option value="${y}" ${String(selectedYear)===y?'selected':''}>${y}</option>`).join('');
}

function setYear(y) {
  selectedYear = parseInt(y);
  applyFilters();
}

function applyFilters() {
  if (currentTab === 'slides') return;
  const q = document.getElementById('search-input').value.toLowerCase();
  const sel = document.getElementById('filter-select');
  const fv = sel.style.display!=='none' ? sel.value : 'All';
  const cfg = tabConfig[currentTab];
  let data = [...(db[currentTab]||[])];
  // year filter for events
  if (currentTab === 'events') {
    data = data.filter(r => r.date.startsWith(String(selectedYear)));
  }
  if (fv!=='All') data = data.filter(r=>String(r[cfg.filter.key]).toLowerCase()===fv.toLowerCase());
  if (q) data = data.filter(r=>{
    if (currentTab === 'events') {
      return r.title.toLowerCase().includes(q) || r.date.includes(q) || (r.time||'').includes(q);
    }
    return cfg.cols.some(c=>String(r[c.key]).toLowerCase().includes(q));
  });
  if (currentTab === 'events') {
    data.sort((a,b) => (a.date+(a.time||'')).localeCompare(b.date+(b.time||'')));
  } else if (sortCol!==null) {
    data.sort((a,b)=>{
      let av=a[sortCol],bv=b[sortCol];
      return (av<bv?-1:av>bv?1:0)*sortDir;
    });
  }
  filtered = data;
  renderTable();
  document.getElementById('stats-bar').innerHTML = cfg.stats(data);
  lucide.createIcons({nameAttr:'data-lucide', attrs:{class:'lucide-icon'}});
  // Highlight search field when filter is active
  const searchEl = document.getElementById('search-input');
  searchEl.style.background = q ? '#eff6ff' : '';
  searchEl.style.borderColor = q ? '#93c5fd' : '';
}

function getCurrentWeekRange() {
  const now = getToday();
  const mon = getMondayOfWeek(now, 0);
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  return { from: localDate(mon), to: localDate(sun) };
}

function isCurrentWeek(dateStr) {
  const w = getCurrentWeekRange();
  return dateStr >= w.from && dateStr <= w.to;
}

function renderTable() {
  // hide/show calendar container and add bar
  const calC = document.getElementById('cal-container');
  const tbl = document.querySelector('.table-wrap table');
  const calViews = ['calendar','week','year'];
  if (currentTab === 'events' && calViews.includes(currentView)) {
    if (tbl) tbl.style.display = 'none';
    if (currentView === 'calendar') renderCalendar();
    else if (currentView === 'week') renderWeekView();
    else if (currentView === 'year') renderYearView();
    return;
  } else {
    if (calC) calC.style.display = 'none';
    if (tbl) tbl.style.display = '';
  }
  if (currentTab === 'events' && currentView === 'monster') { renderMonster(); return; }
  const cfg = tabConfig[currentTab];
  const sortable = currentTab !== 'events';
  document.getElementById('table-head').innerHTML = '<tr>'+cfg.cols.map(c=>
    sortable
      ? `<th onclick="sortBy('${c.key}')" class="${sortCol===c.key?'sorted':''}">${c.label}<span class="si">${sortCol===c.key?(sortDir===1?'↑':'↓'):'↕'}</span></th>`
      : `<th style="cursor:default">${c.label}</th>`
  ).join('')+'<th style="width:40px"></th></tr>';
  document.getElementById('table-body').innerHTML = filtered.map(row => {
    const weekCls = currentTab === 'events' && isCurrentWeek(row.date) ? ' current-week' : '';
    return `<tr onclick="selectRow(${row.id})" class="${selectedId===row.id?'selected':''}${weekCls}">
      ${cfg.cols.map(c=>`<td>${c.render(row[c.key],row)}</td>`).join('')}
      <td class="td-actions" onclick="event.stopPropagation()"><button class="actions-btn" onclick="showCtxMenu(event,${row.id},'${currentTab}')"><i data-lucide="ellipsis" style="width:16px;height:16px"></i></button></td>
    </tr>`;
  }).join('') || `<tr><td colspan="${cfg.cols.length+1}" style="padding:24px;text-align:center;color:#9ca3af">No results</td></tr>`;
  lucide.createIcons({nameAttr:'data-lucide', attrs:{class:'lucide-icon'}});
  // Scroll to current week row in list view
  if (currentTab === 'events' && !listScrolled) {
    listScrolled = true;
    requestAnimationFrame(() => {
      const row = document.querySelector('#table-body tr.current-week');
      if (row) row.scrollIntoView({ block: 'start', behavior: 'instant' });
    });
  }
}

function sortBy(key) {
  if (sortCol===key) sortDir*=-1; else { sortCol=key; sortDir=1; }
  applyFilters();
}

function selectRow(id) {

function showCtxMenu(e, id, tab) {
  e.preventDefault();
  e.stopPropagation();
  tab = tab || currentTab;
  const menu = document.getElementById('ctx-menu');
  let items = `<button onclick="selectRow(${id});hideCtxMenu()"><i data-lucide="pencil" style="width:14px;height:14px"></i> Redigera</button>`;
  if (tab === 'events') {
    items += `<button onclick="duplicateEvent(${id});hideCtxMenu()"><i data-lucide="copy" style="width:14px;height:14px"></i> Duplicera</button>`;
  }
  items += `<button class="ctx-danger" onclick="deleteRecord(${id},'${tab}');hideCtxMenu()"><i data-lucide="trash-2" style="width:14px;height:14px"></i> Ta bort</button>`;
  menu.innerHTML = items;
  menu.style.display = 'block';
  menu.style.left = Math.min(e.clientX, window.innerWidth - 180) + 'px';
  menu.style.top = Math.min(e.clientY, window.innerHeight - 120) + 'px';
  lucide.createIcons({nameAttr:'data-lucide', attrs:{class:'lucide-icon'}});
}

function deleteRecord(id, tab) {
  if (tab === 'events') { deleteEvent(id); return; }
  if (!db[tab]) return;
  db[tab] = db[tab].filter(r=>r.id!==id);
  if (selectedId === id) { selectedId = null; renderSidebar(null); }
  persist(tab);
  applyFilters();
}

function hideCtxMenu() {
  document.getElementById('ctx-menu').style.display = 'none';
}

function duplicateEvent(id) {
  const src = db.events.find(e=>e.id===id);
  if (!src) return;
  const maxId = db.events.reduce((m,e) => Math.max(m,e.id), 0) + 1;
  const copy = JSON.parse(JSON.stringify(src));
  copy.id = maxId;
  copy.volunteers = 0;
  db.events.push(copy);
  assignments[copy.id] = {};
  persist('events');
  applyFilters();
  selectRow(copy.id);
}

document.addEventListener('click', () => hideCtxMenu());
document.addEventListener('contextmenu', e => {
  if (!e.target.closest('.ctx-menu')) hideCtxMenu();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.body.classList.contains('slides-fullscreen')) { document.body.classList.remove('slides-fullscreen'); history.replaceState(null, '', '#slides'); return; }
    if (document.body.classList.contains('nameplate-fullscreen')) { exitNameplateFullscreen(); return; }
    if (document.getElementById('propagate-modal').classList.contains('open')) { executePropagation(false); return; }
    if (document.getElementById('detail-modal').classList.contains('open')) { closeDetailModal(); return; }
    if (document.getElementById('gen-modal').classList.contains('open')) { closeGenModal(); return; }
  }
  if (currentTab === 'slides' && !e.target.closest('input,textarea,select')) {
    const total = document.querySelectorAll('#slides-area .slide').length;
    if (!total) return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); goToSlide((slideIndex + 1) % total); }
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); goToSlide((slideIndex - 1 + total) % total); }
    if (e.key === ' ') { e.preventDefault(); toggleSlidePause(); }
    if (e.key === 'f') { e.preventDefault(); toggleSlideFullscreen(); }
  }
});

function renderMonster() {
  const tasks = db.tasks;

    + `<th class="th-event" onclick="sortBy('date')">Date / Event<span class="si">${sortCol==='date'?(sortDir===1?'↑':'↓'):'↕'}</span></th>`

    + '</tr>';

  const visibleEvents = filtered.filter(ev => (ev.expectedTasks||[]).length > 0);

  document.getElementById('table-body').innerHTML = visibleEvents.map(ev => {
    const reqTasks = ev.expectedTasks || [];
    const weekCls = isCurrentWeek(ev.date) ? ' current-week' : '';

      const asgn = assignments[ev.id]?.[task.id];
      const isRequired = reqTasks.includes(task.id);

      if (task.teamTask) {
        const teams = db.teams.filter(t=>t.taskId===task.id);
        const selTeam = asgn ? teams.find(t=>t.id===asgn.id) : null;

          <div class="pop-label ${!selTeam?'unset':''}${warnCls}" id="lbl_${uid}" onclick="openTeamPop('${uid}',${ev.id},${task.id})">${label}</div>
          <div class="pop-panel" id="pan_${uid}"></div>
        </div></td>`;
      } else {
        const ids = asgn?.ids || [];
        const label = ids.length===0 ? '—' : ids.map(id=>db.contacts.find(c=>c.id===id)?.name.split(' ')[0]).join(', ');
        const uid = `pop_${ev.id}_${task.id}`;
        return `<td onclick="event.stopPropagation()"><div class="pop-cell">
          <div class="pop-label ${ids.length===0?'unset':''}${warnCls}" id="lbl_${uid}" onclick="openPop('${uid}',${ev.id},${task.id})">${label}</div>
          <div class="pop-panel" id="pan_${uid}"></div>

    return `<tr onclick="selectRow(${ev.id})" oncontextmenu="showCtxMenu(event,${ev.id},'events')" class="${selectedId===ev.id?'selected':''}${weekCls}">

  lucide.createIcons({nameAttr:'data-lucide', attrs:{class:'lucide-icon'}});

      if (row) row.scrollIntoView({ block: 'start', behavior: 'instant' });

let calMonth = getToday().getMonth();
let calYear = getToday().getFullYear();
let calWeekOffset = 0;
let dragEventId = null;
let calScrollInit = false;
let listScrolled = false;

function getCalContainer() {
  const wrap = document.querySelector('.table-wrap');
  let c = document.getElementById('cal-container');
  if (!c) { c = document.createElement('div'); c.id = 'cal-container'; wrap.appendChild(c); }
  c.style.display = '';
  c.style.height = '100%';
  wrap.querySelector('table').style.display = 'none';
  return c;
}

function evBadge(ev, extraCls) {
  const cat = (ev.category || 'weekday').toLowerCase();
  return `<div class="${extraCls || 'cal-ev'} cal-ev-${cat}" draggable="true" data-ev-id="${ev.id}"
    onclick="event.stopPropagation();openDetailModal(${ev.id})"
    title="${esc(ev.time || '')} ${esc(ev.title)}">${ev.time || ''} ${esc(ev.title)}</div>`;
}

function groupByDate(events) {
  const m = {};
  events.forEach(ev => { if (!m[ev.date]) m[ev.date] = []; m[ev.date].push(ev); });
  return m;
}

function moveEventToDate(evId, newDate) {
  const ev = db.events.find(e => e.id === evId);
  if (!ev || ev.date === newDate) return;
  ev.date = newDate;
  persist('events');
  // preserve scroll position across re-render
  const scrollEl = document.getElementById('cal-scroll-area') || document.getElementById('week-scroll-area');
  const scrollTop = scrollEl ? scrollEl.scrollTop : 0;
  applyFilters();
  const el = document.getElementById('cal-scroll-area') || document.getElementById('week-scroll-area');
  if (el) el.scrollTop = scrollTop;
}

function initDragDrop(container) {
  container.addEventListener('dragstart', e => {
    const el = e.target.closest('[data-ev-id]');
    if (!el) return;
    dragEventId = parseInt(el.dataset.evId);
    el.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', dragEventId);
  });
  container.addEventListener('dragend', e => {
    const el = e.target.closest('[data-ev-id]');
    if (el) el.classList.remove('dragging');
    dragEventId = null;
    container.querySelectorAll('.drag-over').forEach(c => c.classList.remove('drag-over'));
  });
  container.addEventListener('dragover', e => {
    const cell = e.target.closest('[data-drop-date]');
    if (!cell) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    container.querySelectorAll('.drag-over').forEach(c => c.classList.remove('drag-over'));
    cell.classList.add('drag-over');
  });
  container.addEventListener('dragleave', e => {
    const cell = e.target.closest('[data-drop-date]');
    if (cell && !cell.contains(e.relatedTarget)) cell.classList.remove('drag-over');
  });
  container.addEventListener('drop', e => {
    e.preventDefault();
    const cell = e.target.closest('[data-drop-date]');
    if (!cell || !dragEventId) return;
    cell.classList.remove('drag-over');
    moveEventToDate(dragEventId, cell.dataset.dropDate);
    dragEventId = null;
  });
}

function renderCalendar() {
  const yr = selectedYear;
  const monthNames = ['januari','februari','mars','april','maj','juni','juli','augusti','september','oktober','november','december'];
  const shortMonths = ['jan','feb','mar','apr','maj','jun','jul','aug','sep','okt','nov','dec'];
  const dayHeaders = ['mån','tis','ons','tor','fre','lör','sön'];

  const byDate = groupByDate(filtered);
  const todayStr = getTodayStr();
  const curWeek = getCurrentWeekRange();
  const MAX_VIS = 3;

  document.getElementById('table-head').innerHTML = '';
  document.getElementById('table-body').innerHTML = '';

  const headerRow = `<div class="cal-header" style="font-size:10px">v.</div>` + dayHeaders.map(d => `<div class="cal-header">${d}</div>`).join('');

  let html = `<div class="cal-scroll" id="cal-scroll-area">`;

  for (let m = 0; m < 12; m++) {
    const first = new Date(yr, m, 1);
    const last = new Date(yr, m + 1, 0);
    const startDay = (first.getDay() + 6) % 7;

    // Build weeks for this month
    const startDate = new Date(first);
    startDate.setDate(1 - startDay);
    // figure out how many weeks we need (until we pass the last day)
    const weeks = [];
    const wd = new Date(startDate);
    while (true) {
      weeks.push(new Date(wd));
      wd.setDate(wd.getDate() + 7);
      if (wd > last && wd.getDay() === 1) break;
      if (weeks.length >= 6) break;
    }

    html += `<div class="cal-month-section">`;
    html += `<div class="cal-month-label">${monthNames[m]} <span>${yr}</span></div>`;
    html += `<div class="cal-grid">${headerRow}`;

    weeks.forEach(weekMon => {
      const wn = getWeekNumber(weekMon);
      html += `<div class="cal-wk">${wn}</div>`;
      for (let i = 0; i < 7; i++) {
        const day = new Date(weekMon);
        day.setDate(weekMon.getDate() + i);
        const ds = localDate(day);
        const outside = day.getMonth() !== m;
        const isToday = ds === todayStr;
        const inCurWeek = ds >= curWeek.from && ds <= curWeek.to;
        let cls = 'cal-cell';
        if (outside) cls += ' outside';
        if (isToday) cls += ' today';
        if (inCurWeek && !outside) cls += ' current-week-cell';

        const evs = byDate[ds] || [];
        const visible = evs.slice(0, MAX_VIS);
        const extra = evs.length - MAX_VIS;

        const dayLabel = day.getDate() === 1 && !outside ? `1 ${shortMonths[day.getMonth()]}` : `${day.getDate()}`;
        let inner = `<div class="cal-day-num">${dayLabel}</div>`;
        visible.forEach(ev => { inner += evBadge(ev); });
        if (extra > 0) inner += `<div class="cal-more" onclick="event.stopPropagation();calShowAll('${ds}')">+${extra} till</div>`;
        html += `<div class="${cls}" data-drop-date="${ds}" onclick="if(!event.target.closest('[data-ev-id],.cal-more'))newEventOnDate('${ds}')">${inner}</div>`;
      }
    });

    html += '</div></div>';
  }

  html += '</div>';
  // Save scroll position before re-render
  const oldScroll = document.getElementById('cal-scroll-area');
  const savedScrollTop = oldScroll ? oldScroll.scrollTop : null;

  const c = getCalContainer();
  c.innerHTML = html;
  initDragDrop(c);

  if (!calScrollInit) {
    calScrollInit = true;
    requestAnimationFrame(() => {
      const scrollArea = document.getElementById('cal-scroll-area');
      if (!scrollArea) return;
      const todayCell = scrollArea.querySelector('.cal-cell.today');
      if (todayCell) {
        todayCell.scrollIntoView({ block: 'center', behavior: 'instant' });
      }
    });
  } else if (savedScrollTop !== null) {
    const scrollArea = document.getElementById('cal-scroll-area');
    if (scrollArea) scrollArea.scrollTop = savedScrollTop;
  }
}

function renderWeekView() {
  const yr = selectedYear;
  const dayLabels = ['mån','tis','ons','tor','fre','lör','sön'];
  const monthNames = ['jan','feb','mar','apr','maj','jun','jul','aug','sep','okt','nov','dec'];
  const todayStr = getTodayStr();
  const byDate = groupByDate(filtered);

  // Build all weeks for the year
  const janFirst = new Date(yr, 0, 1);
  const startMon = new Date(janFirst);
  startMon.setDate(janFirst.getDate() - ((janFirst.getDay() + 6) % 7));
  const decLast = new Date(yr, 11, 31);
  const endSun = new Date(decLast);
  endSun.setDate(decLast.getDate() + (7 - ((decLast.getDay() + 6) % 7)) % 7);

  document.getElementById('table-head').innerHTML = '';
  document.getElementById('table-body').innerHTML = '';

  let html = `<div class="week-scroll" id="week-scroll-area"><div class="week-container">`;

  const d = new Date(startMon);
  while (d <= endSun) {
    const wn = getWeekNumber(d);
    const monDate = localDate(d);
    const sunD = new Date(d); sunD.setDate(d.getDate() + 6);
    const sunDate = localDate(sunD);
    const monMonth = monthNames[d.getMonth()];
    const sunMonth = monthNames[sunD.getMonth()];
    const range = monMonth === sunMonth
      ? `${d.getDate()}–${sunD.getDate()} ${monMonth}`
      : `${d.getDate()} ${monMonth} – ${sunD.getDate()} ${sunMonth}`;

    html += `<div class="week-section" data-week-date="${localDate(d)}"><div class="week-section-header">Vecka ${wn} <span>${range}</span></div>`;
    html += `<div class="week-grid">`;

    for (let i = 0; i < 7; i++) {
      const day = new Date(d);
      day.setDate(d.getDate() + i);
      const ds = localDate(day);
      const isToday = ds === todayStr;
      let cls = 'week-col';
      if (isToday) cls += ' today';

      const evs = byDate[ds] || [];
      let inner = `<div class="week-col-header${isToday?' today-hdr':''}">
        ${dayLabels[i]}<span class="week-date">${day.getDate()}</span>
      </div>`;
      evs.forEach(ev => {
        const cat = (ev.category || 'weekday').toLowerCase();
        inner += `<div class="week-ev cal-ev-${cat}" draggable="true" data-ev-id="${ev.id}"
          onclick="event.stopPropagation();openDetailModal(${ev.id})">
          <div class="week-ev-time">${ev.time || ''}</div>
          <div class="week-ev-title">${ev.title}</div>
        </div>`;
      });
      html += `<div class="${cls}" data-drop-date="${ds}" onclick="if(!event.target.closest('[data-ev-id]'))newEventOnDate('${ds}')">${inner}</div>`;
    }

    html += `</div></div>`;
    d.setDate(d.getDate() + 7);
  }

  html += '</div></div>';
  const oldWeekScroll = document.getElementById('week-scroll-area');
  const savedWeekTop = oldWeekScroll ? oldWeekScroll.scrollTop : null;

  const c = getCalContainer();
  c.innerHTML = html;
  initDragDrop(c);

  if (!calScrollInit) {
    calScrollInit = true;
    requestAnimationFrame(() => {
      const scrollArea = document.getElementById('week-scroll-area');
      if (!scrollArea) return;
      const todayCol = scrollArea.querySelector('.week-col.today');
      if (todayCol) todayCol.scrollIntoView({ block: 'center', behavior: 'instant' });
    });
  } else if (savedWeekTop !== null) {
    const scrollArea = document.getElementById('week-scroll-area');
    if (scrollArea) scrollArea.scrollTop = savedWeekTop;
  }
}

function renderYearView() {
  const monthNames = ['jan','feb','mar','apr','maj','jun','jul','aug','sep','okt','nov','dec'];
  const dayHeaders = ['m','t','o','t','f','l','s'];
  const todayStr = getTodayStr();
  const yr = selectedYear;

  // collect all event dates for this year
  const eventDates = new Set(filtered.map(e => e.date));

  document.getElementById('table-head').innerHTML = '';
  document.getElementById('table-body').innerHTML = '';

  let html = `<div class="year-grid">`;
  for (let m = 0; m < 12; m++) {
    const first = new Date(yr, m, 1);
    const startDay = (first.getDay() + 6) % 7;
    const daysInMonth = new Date(yr, m + 1, 0).getDate();

    html += `<div class="year-month"><div class="year-month-title">${monthNames[m]} ${yr}</div><div class="year-mini-grid">`;
    html += dayHeaders.map(d => `<div class="year-mini-hdr">${d}</div>`).join('');

    // leading blanks
    for (let i = 0; i < startDay; i++) html += `<div class="year-mini-day outside"></div>`;
    for (let d = 1; d <= daysInMonth; d++) {
      const ds = `${yr}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isToday = ds === todayStr;
      const hasEv = eventDates.has(ds);
      let cls = 'year-mini-day';
      if (isToday) cls += ' today';
      if (hasEv) cls += ' has-events';
      html += `<div class="${cls}" onclick="goToWeek('${ds}')" style="cursor:pointer">${d}</div>`;
    }
    // trailing blanks
    const total = startDay + daysInMonth;
    const trailing = (7 - total % 7) % 7;
    for (let i = 0; i < trailing; i++) html += `<div class="year-mini-day outside"></div>`;

    html += '</div></div>';
  }
  html += '</div>';
  const c = getCalContainer();
  c.innerHTML = html;
}

function calPrev() { calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } renderTable(); }
function calNext() { calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } renderTable(); }
function calToday() { const n = getToday(); calMonth = n.getMonth(); calYear = n.getFullYear(); renderTable(); }

function goToWeek(dateStr) {
  // Find the Monday of the week containing dateStr
  const d = new Date(dateStr + 'T00:00:00');
  const mon = new Date(d);
  mon.setDate(d.getDate() - ((d.getDay() + 6) % 7));
  const monStr = localDate(mon);
  calScrollInit = true; // prevent auto-scroll to today
  setView('week');
  requestAnimationFrame(() => {
    const scrollArea = document.getElementById('week-scroll-area');
    if (!scrollArea) return;
    const section = scrollArea.querySelector(`[data-week-date="${monStr}"]`);
    if (section) section.scrollIntoView({ block: 'start', behavior: 'instant' });
  });
}

// ── SLIDES ────────────────────────────────────────────────────────────────────
let slideWeekOffset = 0;

function getWeekNumber(d) {
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  date.setUTCDate(date.getUTCDate() + 4 - (date.getUTCDay() || 7));
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
}

function getMondayOfWeek(refDate, offset) {
  const d = new Date(refDate);
  const day = d.getDay() || 7;
  d.setDate(d.getDate() - day + 1 + offset * 7);
  d.setHours(0,0,0,0);
  return d;
}

let slideTimer = null;
let slideIndex = 0;
let slidePaused = false;

function renderSlides() {
  const area = document.getElementById('slides-area');
  const today = getToday();
  const monday = getMondayOfWeek(today, slideWeekOffset);
  const sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);
  const weekNum = getWeekNumber(monday);
  const monStr = localDate(monday);
  const sunStr = localDate(sunday);

  const weekEvents = (db.events||[])
    .filter(e => e.date >= monStr && e.date <= sunStr)
    .sort((a,b) => (a.date+a.time).localeCompare(b.date+b.time));

  const dayNames = ['söndag','måndag','tisdag','onsdag','torsdag','fredag','lördag'];
  const byDay = {};
  weekEvents.forEach(e => { if (!byDay[e.date]) byDay[e.date] = []; byDay[e.date].push(e); });

  // Build column-based week slide
  const sortedDates = Object.keys(byDay).sort();
  let colsHtml = '';
  if (sortedDates.length === 0) {
    colsHtml = '<div style="flex:1;display:flex;align-items:center;justify-content:center;color:#475569;font-size:clamp(14px,1.5vw,24px)">Inga händelser denna vecka</div>';
  } else {
    colsHtml = sortedDates.map((dateStr, colIdx) => {
      const d = new Date(dateStr + 'T00:00:00');
      const dayName = dayNames[d.getDay()];
      const evHtml = byDay[dateStr].map((ev, evIdx) => {
        const delay = (colIdx * 0.15 + evIdx * 0.08).toFixed(2);
        const desc = ev.description ? ` · ${ev.description}` : '';
        return `<div class="slide-ev" style="animation-delay:${delay}s">
          <div class="slide-ev-title">${ev.title}</div>
          <div class="slide-ev-meta">${ev.category || ''} · ${ev.time || ''}</div>
        </div>`;
      }).join('');
      return `<div class="slide-col" style="animation-delay:${(colIdx*0.12).toFixed(2)}s">
        <div class="slide-col-day">${dayName.charAt(0).toUpperCase()+dayName.slice(1)}</div>
        <div class="slide-col-events">${evHtml}</div>
      </div>`;
    }).join('');
  }

  const logoUrl = db.slideLogo || '';
  const logoHtml = logoUrl ? `<div class="slide-logo"><img src="${logoUrl}" alt="Logo"></div>` : '';
  const weekSlide = `<div class="slide-week">
    <div class="slide-week-header"><h2>Händer i veckan (v${weekNum})</h2></div>
    <div class="slide-columns">${colsHtml}</div>
    <div class="slide-footer">
      <div class="slide-clock" id="slide-clock"></div>
      ${logoHtml}
    </div>
  </div>`;

  // Build slides array: week overview first, then event promos, then active global promos
  const eventPromos = weekEvents.flatMap(e => (e.promoSlides || []).filter(Boolean));
  const globalPromos = (db.globalSlides || []).filter(s => s.active).map(s => s.url);
  const promos = [...eventPromos, ...globalPromos];
  const slides = [];
  slides.push(weekSlide);
  promos.forEach(url => {
    slides.push(`<div class="slide-promo"><img src="${url}" alt="Promo"></div>`);
  });

  let html = `<div class="slide-progress" id="slide-progress"></div>`;
  html += slides.map((s, i) => `<div class="slide${i===0?' active':''}">${s}</div>`).join('');
  html += `<div class="slide-controls">`;
  html += slides.map((_, i) => `<button class="slide-dot${i===0?' active':''}" onclick="goToSlide(${i})"></button>`).join('');
  if (slides.length > 1) html += `<button class="slide-pause" onclick="toggleSlidePause()" id="slide-pause-btn">⏸</button>`;
  html += `<button class="slide-pause" onclick="toggleSlideFullscreen()" title="Fullskärm"><i data-lucide="maximize" style="width:14px;height:14px"></i></button>`;
  html += `</div>`;
  area.innerHTML = html;

  slideIndex = 0;
  slidePaused = false;
  if (slideTimer) clearTimeout(slideTimer);
  startSlideClock();
  // 10s for ≤3 cols, +2.5s per extra col, max 20s
  const weekDuration = Math.min(20, Math.max(10, 10 + (sortedDates.length - 3) * 2.5)) * 1000;
  const promoDuration = 10000;
  slideDurations = [weekDuration, ...promos.map(() => promoDuration)];
  startSlideProgress();
}

let slideDurations = [];

function startSlideProgress() {
  if (slideTimer) clearTimeout(slideTimer);
  const bar = document.getElementById('slide-progress');
  if (!bar) return;
  if (slidePaused) { bar.style.display = 'none'; return; }
  bar.style.display = '';
  const dur = slideDurations[slideIndex] || 10000;
  bar.classList.remove('animating');
  bar.style.width = '0%';
  void bar.offsetWidth;
  bar.classList.add('animating');
  bar.style.transitionDuration = dur + 'ms';
  bar.style.width = '100%';

  if (slideDurations.length <= 1) return;
  slideTimer = setTimeout(() => {
    if (!slidePaused) {
      const total = document.querySelectorAll('#slides-area .slide').length;
      goToSlide((slideIndex + 1) % total, true);
    }
  }, dur);
}

function goToSlide(i, auto) {
  if (!auto && !slidePaused) { slidePaused = true; const btn = document.getElementById('slide-pause-btn'); if (btn) btn.textContent = '▶'; }
  slideIndex = i;
  const area = document.getElementById('slides-area');
  if (!area) return;
  area.querySelectorAll('.slide').forEach((s, idx) => s.classList.toggle('active', idx === i));
  area.querySelectorAll('.slide-dot').forEach((d, idx) => d.classList.toggle('active', idx === i));
  startSlideProgress();
}

function toggleSlidePause() {
  slidePaused = !slidePaused;
  const btn = document.getElementById('slide-pause-btn');
  if (btn) btn.textContent = slidePaused ? '▶' : '⏸';
  if (slidePaused) {
    if (slideTimer) { clearTimeout(slideTimer); slideTimer = null; }
    const bar = document.getElementById('slide-progress');
    if (bar) bar.style.display = 'none';
  } else {
    startSlideProgress();
  }
}

function toggleSlideFullscreen() {
  document.body.classList.toggle('slides-fullscreen');
  const isFull = document.body.classList.contains('slides-fullscreen');
  history.replaceState(null, '', isFull ? '#slides/fullscreen' : '#slides');
}

let slideClockTimer = null;
function startSlideClock() {
  if (slideClockTimer) clearInterval(slideClockTimer);
  updateSlideClock();
  slideClockTimer = setInterval(updateSlideClock, 10000);
}
function updateSlideClock() {
  const el = document.getElementById('slide-clock');
  if (!el) return;
  const now = new Date();
  el.textContent = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');

// ── CATEGORIES TAB ────────────────────────────────────────────────────────────
function ensureCategories() {
  if (!db.categories) {
    const used = [...new Set((db.events||[]).map(e=>e.category).filter(Boolean))];
    db.categories = used.map((name,i) => ({id:i+1, name}));
    persist('categories');
  }
}

function renderCategories() {
  ensureCategories();
  const area = document.getElementById('categories-area');
  const cats = db.categories || [];
  const events = db.events || [];

  // Find uncategorized
  const catNames = new Set(cats.map(c=>c.name));
  const uncategorized = events.filter(e => !e.category || !catNames.has(e.category));

  let html = `<div class="team-board-toolbar">
    <span style="font-size:14px;font-weight:600;color:#374151">${cats.length} kategorier · ${events.length} händelser</span>
    <span style="flex:1"></span>
    <button class="btn-ghost" onclick="addCategory()" style="font-size:12px;display:inline-flex;align-items:center;gap:4px"><i data-lucide="plus" style="width:12px;height:12px"></i> Ny kategori</button>
  </div>
  <div style="padding:16px;overflow-y:auto;flex:1">`;

  if (uncategorized.length > 0) {
    html += `<div style="background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:12px 16px;margin-bottom:16px">
      <div style="font-size:13px;font-weight:600;color:#991b1b;margin-bottom:6px">Okategoriserade (${uncategorized.length})</div>
      <div style="display:flex;flex-wrap:wrap;gap:4px">${uncategorized.slice(0,20).map(e =>
        `<span style="font-size:11px;background:#fee2e2;color:#991b1b;padding:2px 8px;border-radius:4px;cursor:pointer" onclick="switchTab('events',true);selectRow(${e.id})">${e.title}</span>`
      ).join('')}${uncategorized.length>20?`<span style="font-size:11px;color:#991b1b">+${uncategorized.length-20} till</span>`:''}</div>
    </div>`;
  }

  cats.forEach(cat => {
    const linked = events.filter(e => e.category === cat.name);
    const cls = cat.name.toLowerCase();
    html += `<div style="background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:14px 18px;margin-bottom:12px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <span class="badge badge-${cls}" style="font-size:12px">${cat.name}</span>
        <span style="font-size:12px;color:#9ca3af">${linked.length} händelser</span>
        <span style="flex:1"></span>
        <button onclick="renameCategory(${cat.id})" style="background:none;border:none;color:#6b7280;cursor:pointer;font-size:12px;display:inline-flex;align-items:center;gap:3px"><i data-lucide="pencil" style="width:12px;height:12px"></i> Byt namn</button>
        ${linked.length===0?`<button onclick="deleteCategory(${cat.id})" style="background:none;border:none;color:#ef4444;cursor:pointer;font-size:12px;display:inline-flex;align-items:center;gap:3px"><i data-lucide="trash-2" style="width:12px;height:12px"></i></button>`:''}
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:4px">${linked.slice(0,30).map(e =>
        `<span style="font-size:11px;background:#f3f4f6;color:#374151;padding:2px 8px;border-radius:4px;cursor:pointer" onclick="switchTab('events',true);selectRow(${e.id})">${e.date} ${e.title}</span>`
      ).join('')}${linked.length>30?`<span style="font-size:11px;color:#9ca3af">+${linked.length-30} till</span>`:''}</div>
    </div>`;
  });

  html += '</div>';
  area.innerHTML = html;
