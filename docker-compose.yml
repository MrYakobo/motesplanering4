services:
  app:
    build: .
    ports:
      - "1999:3000"
    env_file:
      - .env
    volumes:
      - ./server.js:/app/server.js
      - ./lib:/app/lib
      #- ./frontend/dist:/app/frontend/dist
      - ./data_prod.json:/app/data_prod.json
      - ./backups:/app/backups
      - ./uploads:/app/uploads
    restart: unless-stopped
